<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON HORIZON</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff2975;
            --cyan: #00f0ff;
            --purple: #b026ff;
            --navy: #0a0a2e;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--navy);
            font-family: 'Rajdhani', sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .interactive {
            pointer-events: auto;
        }

        /* CRT Effect Overlay */
        #crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 20;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.8rem;
            background: linear-gradient(to bottom, #fff 20%, #ff2975 50%, #b026ff 80%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--cyan));
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: var(--cyan);
            margin-top: 1rem;
            min-height: 1.5em;
            text-shadow: 0 0 10px var(--cyan);
        }

        .cta-button {
            margin-top: 3rem;
            padding: 1rem 3rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: transparent;
            color: var(--pink);
            border: 2px solid var(--pink);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            box-shadow: 0 0 15px var(--pink);
        }

        .cta-button:hover {
            background: var(--pink);
            color: white;
            box-shadow: 0 0 40px var(--pink);
            transform: scale(1.05);
        }

        .social-links {
            margin-top: 4rem;
            display: flex;
            gap: 2rem;
            pointer-events: auto;
        }

        .social-link {
            color: var(--cyan);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: color 0.3s;
            text-shadow: 0 0 5px var(--cyan);
        }

        .social-link:hover {
            color: var(--pink);
            text-shadow: 0 0 10px var(--pink);
        }

        #audio-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            pointer-events: auto;
        }

        .audio-btn {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="crt-overlay"></div>
    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <h1 class="interactive">NEON HORIZON</h1>
        <div id="subtitle" class="subtitle"></div>
        <button id="cta" class="cta-button interactive">ENTER THE GRID</button>
        
        <div class="social-links interactive">
            <a href="#" class="social-link">INSTAGRAM</a>
            <a href="#" class="social-link">TWITTER</a>
            <a href="#" class="social-link">DISCORD</a>
        </div>
    </div>

    <div id="audio-controls">
        <button id="audio-toggle" class="audio-btn interactive">AUDIO: OFF</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // --- Constants & State ---
        const COLORS = {
            pink: 0xff2975,
            cyan: 0x00f0ff,
            purple: 0xb026ff,
            navy: 0x0a0a2e
        };

        let scene, camera, renderer, composer;
        let grid, sun, stars, mountains = [];
        let clock = new THREE.Clock();
        let audioCtx, oscillator, gainNode;
        let isAudioPlaying = false;

        // --- Custom Shaders ---
        const SunShader = {
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xffaa00) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                uniform float time;
                uniform vec3 color;
                void main() {
                    float dist = distance(vUv, vec2(0.5));
                    float alpha = smoothstep(0.5, 0.4, dist);
                    
                    // Horizontal scan lines
                    float lines = sin(vUv.y * 150.0) * 0.1 + 0.9;
                    
                    // Subtle pulse
                    float pulse = sin(time * 2.0) * 0.05 + 0.95;
                    
                    vec3 finalColor = color * lines * pulse;
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `
        };

        const ChromaticAberrationShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'amount': { value: 0.003 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float amount;
                varying vec2 vUv;
                void main() {
                    float r = texture2D(tDiffuse, vUv + vec2(amount, 0.0)).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - vec2(amount, 0.0)).b;
                    gl_FragColor = vec4(r, g, b, 1.0);
                }
            `
        };

        // --- Initialization ---
        const init = () => {
            setupScene();
            setupLights();
            createGrid();
            createSun();
            createStars();
            createMountains();
            setupPostProcessing();
            setupUI();
            animate();
        };

        const setupScene = () => {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.navy);
            scene.fog = new THREE.FogExp2(COLORS.navy, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, -50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        };

        const setupLights = () => {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(COLORS.cyan, 1);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);
        };

        const createGrid = () => {
            const size = 2000;
            const divisions = 100;
            grid = new THREE.GridHelper(size, divisions, COLORS.pink, COLORS.purple);
            grid.position.y = 0;
            scene.add(grid);

            const geometry = new THREE.PlaneGeometry(size, size);
            const material = new THREE.MeshBasicMaterial({ 
                color: COLORS.navy, 
                transparent: true, 
                opacity: 0.8 
            });
            const ground = new THREE.Mesh(geometry, material);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = -size/2;
            scene.add(ground);
        };

        const createSun = () => {
            const geometry = new THREE.CircleGeometry(50, 64);
            const material = new THREE.ShaderMaterial({
                uniforms: THREE.UniformsUtils.clone(SunShader.uniforms),
                vertexShader: SunShader.vertexShader,
                fragmentShader: SunShader.fragmentShader,
                transparent: true
            });
            sun = new THREE.Mesh(geometry, material);
            sun.position.set(0, 20, -200);
            scene.add(sun);
        };

        const createStars = () => {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.8 });
            
            const starVertices = [];
            for (let i = 0; i < 5000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 1000;
                const z = (Math.random() - 0.5) * 2000;
                starVertices.push(x, y, z);
            }
            
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        };

        const createMountains = () => {
            const geometries = [
                new THREE.ConeGeometry(20, 40, 4),
                new THREE.IcosahedronGeometry(25, 0),
                new THREE.BoxGeometry(20, 40, 20)
            ];
            const material = new THREE.MeshBasicMaterial({ color: COLORS.purple, wireframe: true });

            for (let i = 0; i < 30; i++) {
                const geometry = geometries[i % geometries.length];
                const mountain = new THREE.Mesh(geometry, material);
                mountain.position.set(
                    (Math.random() - 0.5) * 600, 
                    15, 
                    -Math.random() * 600
                );
                mountain.scale.set(Math.random() * 3 + 1, Math.random() * 2 + 1, Math.random() * 3 + 1);
                mountain.rotation.y = Math.random() * Math.PI;
                scene.add(mountain);
                mountains.push(mountain);
            }
        };

        const setupPostProcessing = () => {
            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, // strength
                0.4, // radius
                0.85 // threshold
            );
            composer.addPass(bloomPass);

            const chromaticPass = new ShaderPass(ChromaticAberrationShader);
            composer.addPass(chromaticPass);
        };

        const setupUI = () => {
            const subtitle = document.getElementById('subtitle');
            const text = "Welcome to the future that never was";
            let i = 0;

            const typewriter = () => {
                if (i < text.length) {
                    subtitle.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typewriter, 70);
                }
            };
            typewriter();

            document.getElementById('audio-toggle').addEventListener('click', toggleAudio);
        };

        const toggleAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(55, audioCtx.currentTime); 
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }

            if (isAudioPlaying) {
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                document.getElementById('audio-toggle').innerText = "AUDIO: OFF";
            } else {
                gainNode.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime + 0.5);
                document.getElementById('audio-toggle').innerText = "AUDIO: ON";
            }
            isAudioPlaying = !isAudioPlaying;
        };

        const onWindowResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        };

        const animate = () => {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Update Sun
            if (sun && sun.material.uniforms) {
                sun.material.uniforms.time.value = elapsed;
            }

            // Scroll Grid
            if (grid) {
                grid.position.z += 0.8;
                if (grid.position.z > 20) {
                    grid.position.z = 0;
                }
            }

            // Move mountains towards viewer
            mountains.forEach(m => {
                m.position.z += 0.8;
                if (m.position.z > 20) {
                    m.position.z = -600;
                    m.position.x = (Math.random() - 0.5) * 600;
                }
            });

            // Drift stars
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0001;

            composer.render();
        };

        init();
    </script>
</body>
</html>
