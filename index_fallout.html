<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEX Staffing Solutions - Factory Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* --- 1. GLOBAL & UI STYLES --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #050505; color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app-wrapper {
            width: 100vw; height: 100vh; overflow: hidden;
            position: relative; transform-origin: center center;
        }

        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(11, 12, 16, 0.85); padding: 15px 25px;
            border-radius: 8px; font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.2);
            pointer-events: none; z-index: 100;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .panel-title {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.5px; color: #81C784; margin-bottom: 6px;
        }
        .panel-data {
            font-size: 22px; font-weight: bold;
            color: #4CAF50; font-family: 'Courier New', Courier, monospace;
        }

        /* --- EASTER EGG OVERLAY --- */
        #easter-egg-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(15, 0, 0, 0.95); z-index: 9000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .warning-text {
            color: #ff1111; font-family: 'Courier New', Courier, monospace;
            font-size: 3.5vw; text-align: center; font-weight: bold;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            animation: warning-blink 1.2s steps(2, start) infinite;
        }
        @keyframes warning-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .crt-shutdown { animation: crt-power-off 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .crt-turn-on { animation: crt-power-on 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes crt-power-off {
            0% { transform: scale(1, 1); opacity: 1; filter: brightness(1) contrast(1); }
            30% { transform: scale(1, 0.005); opacity: 1; filter: brightness(5) contrast(3); }
            70% { transform: scale(0.005, 0.005); opacity: 1; filter: brightness(5); }
            100% { transform: scale(0, 0); opacity: 0; filter: brightness(0); }
        }
        @keyframes crt-power-on {
            0% { transform: scale(0, 0); opacity: 0; filter: brightness(0); }
            40% { transform: scale(0.005, 0.005); opacity: 1; filter: brightness(5); }
            70% { transform: scale(1, 0.005); opacity: 1; filter: brightness(5) contrast(3); }
            100% { transform: scale(1, 1); opacity: 1; filter: brightness(1) contrast(1); }
        }

        /* --- 2. MONITOR OVERLAYS (BASE) --- */
        .monitor-overlay {
            position: absolute;
            background: #020602;
            border: 4px solid #113311;
            box-sizing: border-box; overflow: hidden;
            pointer-events: auto; z-index: 50;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0,0,0,1);
            transform-origin: center center;
        }

        .monitor-overlay.power-off {
            background: rgba(5, 5, 5, 0.95) !important;
            border-color: rgba(30, 30, 30, 0.8) !important;
            box-shadow: inset 0 0 50px rgba(0,0,0,1) !important;
            pointer-events: none !important;
        }
        .monitor-overlay > * { transition: opacity 0.3s ease; }
        .monitor-overlay.power-off > * { opacity: 0 !important; }

        .monitor-cover {
            position: absolute; inset: 0; background: #050a05;
            z-index: 60; display: flex; align-items: center; justify-content: center; text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2em; font-weight: bold; letter-spacing: 2px; color: #1cf843;
            text-shadow: 0 0 10px rgba(28, 248, 67, 0.8);
            border: 2px solid #113311;
            box-shadow: inset 0 0 20px rgba(28, 248, 67, 0.1);
            transition: opacity 0.2s ease; cursor: pointer;
        }
        .monitor-cover:hover {
            background: #0a140a;
            box-shadow: inset 0 0 30px rgba(28, 248, 67, 0.3);
        }

        .monitor-header {
            background: #0a1f0a; height: 35px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 15px; font-size: 14px;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            letter-spacing: 2px; color: #1cf843; user-select: none;
            flex-shrink: 0; border-bottom: 2px solid #1cf843;
            box-shadow: 0 2px 10px rgba(28, 248, 67, 0.2);
            cursor: grab; /* Shows it's draggable */
        }
        .monitor-header:active { cursor: grabbing; }

        .close-btn {
            display: none; color: #1cf843;
            font-size: 22px; font-weight: bold; cursor: pointer; padding: 0 5px;
        }
        .close-btn:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        /* --- 3. RETRO UI STYLES --- */
        .monitor-body {
            flex-grow: 1; position: relative;
            overflow: hidden; display: flex; flex-direction: column;
        }
        
        .retro-wrapper {
            background-color: #040c04; color: #1cf843;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            text-shadow: 0 0 6px rgba(28, 248, 67, 0.8);
            height: 100%; width: 100%; position: relative;
            padding: 25px; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column;
            font-size: 1.1em; line-height: 1.4;
        }

        .retro-wrapper::after {
            content: " "; display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }

        .retro-title {
            margin-bottom: 15px; border-bottom: 2px solid #1cf843; padding-bottom: 10px;
            font-size: 1.2em; text-transform: uppercase;
        }

        .term-log { flex-grow: 1; overflow-y: auto; word-wrap: break-word; z-index: 2; position: relative; }
        .term-log::-webkit-scrollbar { width: 12px; }
        .term-log::-webkit-scrollbar-track { background: #040c04; border-left: 1px solid #113311; }
        .term-log::-webkit-scrollbar-thumb { background: #1cf843; }

        .term-input-row { display: flex; align-items: center; z-index: 2; position: relative; margin-top: 10px; }
        .term-input {
            width: 100%; background: transparent; color: #1cf843;
            border: none; outline: none; font-family: inherit; font-size: inherit; font-weight: inherit;
            text-shadow: 0 0 6px rgba(28, 248, 67, 0.8); margin-left: 10px;
        }

        .sys-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 2; position: relative;
        }
        .sys-block { margin-bottom: 20px; }
        .ascii-bar { color: #1cf843; letter-spacing: 2px; }
        
        .website-iframe {
            flex-grow: 1; border: none; width: 100%; height: 100%; 
            background: #fff; z-index: 2; position: relative;
        }

        /* --- RESIZE HANDLE STYLES --- */
        .resize-handle {
            position: absolute; bottom: 0; right: 0;
            width: 25px; height: 25px; cursor: nwse-resize;
            z-index: 100; display: none; /* Shown only when .is-centered */
        }
        .resize-handle::after {
            content: ''; position: absolute; bottom: 6px; right: 6px;
            width: 0; height: 0; border-style: solid;
            border-width: 0 0 14px 14px; border-color: transparent transparent #1cf843 transparent;
            opacity: 0.6; transition: opacity 0.2s;
        }
        .resize-handle:hover::after { opacity: 1; filter: drop-shadow(0 0 5px #1cf843); }

        .monitor-overlay.is-centered .resize-handle { display: block; }

        /* Unified state for resizing OR moving to protect iframes from stealing pointers */
        .monitor-overlay.is-interacting iframe { pointer-events: none; }
        .monitor-overlay.is-interacting { box-shadow: 0 15px 50px rgba(28, 248, 67, 0.25), inset 0 0 40px rgba(0,0,0,1); opacity: 0.95; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="ui-panel">
        <div class="panel-title">Active Entity Position</div>
        <div class="panel-data" id="coords-display">X: -- | Y: --</div>
    </div>

    <div id="easter-egg-overlay">
        <div class="warning-text">
            ROBOTS HAVE ASSUMED CONTROL.<br><br>SHUTTING THE SYSTEMS DOWN<br>AND REBOOTING...
        </div>
    </div>
</div>

<script>
    // --- 1. PIXI INITIALIZATION ---
    PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
    const app = new PIXI.Application({ resizeTo: window, backgroundColor: 0x121214 });
    document.getElementById('app-wrapper').appendChild(app.view);

    const backgroundLayer = new PIXI.Container();
    const entityLayer = new PIXI.Container();
    entityLayer.sortableChildren = true;
    const fxLayer = new PIXI.Container();

    app.stage.addChild(backgroundLayer);
    app.stage.addChild(entityLayer);
    app.stage.addChild(fxLayer);

    const bgSprite = PIXI.Sprite.from('gemini_image.png');
    bgSprite.anchor.set(0.5, 0.5);

    function resizeBackground() {
        bgSprite.x = app.screen.width / 2;
        bgSprite.y = app.screen.height / 2;
        const scaleX = app.screen.width / (bgSprite.texture.width || 1);
        const scaleY = app.screen.height / (bgSprite.texture.height || 1);
        bgSprite.scale.set(Math.max(scaleX, scaleY));
        syncMonitors();
    }
    bgSprite.texture.baseTexture.on('loaded', resizeBackground);
    window.addEventListener('resize', resizeBackground);
    backgroundLayer.addChild(bgSprite);

    // --- 3. ISOMETRIC ENGINE ---
    let TILE_W = 128, TILE_H = 64;
    function getOrigin() { return { x: app.screen.width / 2, y: app.screen.height * 0.3 }; }
    function toIso(cartX, cartY) {
        const origin = getOrigin();
        return { x: (cartX - cartY) * (TILE_W / 2) + origin.x, y: (cartX + cartY) * (TILE_H / 2) + origin.y };
    }
    function toCart(screenX, screenY) {
        const origin = getOrigin();
        let adjX = screenX - origin.x, adjY = screenY - origin.y;
        return { x: (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2, y: (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2 };
    }

    // --- 4. GLOBAL RESIZE & DRAG LOGIC ---
    let activeResizingMonitor = null;
    let rStartX = 0, rStartY = 0, rStartW = 0, rStartH = 0;

    let activeDraggingMonitor = null;
    let dStartX = 0, dStartY = 0, dStartLeft = 0, dStartTop = 0;

    window.addEventListener('pointermove', (e) => {
        if (activeResizingMonitor) {
            const dx = e.clientX - rStartX;
            const dy = e.clientY - rStartY;
            let newW = rStartW + dx;
            let newH = rStartH + dy;
            
            newW = Math.max(400, newW);
            newH = Math.max(300, newH);
            
            activeResizingMonitor.style.width = `${newW}px`;
            activeResizingMonitor.style.height = `${newH}px`;
        }

        if (activeDraggingMonitor) {
            const dx = e.clientX - dStartX;
            const dy = e.clientY - dStartY;
            activeDraggingMonitor.style.left = `${dStartLeft + dx}px`;
            activeDraggingMonitor.style.top = `${dStartTop + dy}px`;
        }
    });

    window.addEventListener('pointerup', () => {
        if (activeResizingMonitor) {
            activeResizingMonitor.classList.remove('is-interacting');
            activeResizingMonitor = null;
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
        }
        if (activeDraggingMonitor) {
            activeDraggingMonitor.classList.remove('is-interacting');
            activeDraggingMonitor = null;
            document.body.style.userSelect = '';
        }
    });

    // --- 5. NEW MONITOR SYSTEM (DROP-DOWN + RESIZE + DRAG) ---
    const monitors = [];
    function createMonitorOverlay(id, label, localX, localY, localWidth, localHeight, contentHTML, baseTransform = 'none') {
        const div = document.createElement('div');
        div.className = 'monitor-overlay';
        div.id = id;

        div.innerHTML = `
            <div class="monitor-cover">${label}</div>
            <div class="monitor-header"><span>IBEX OS // ${label}</span><div class="close-btn">[X]</div></div>
            <div class="monitor-body">${contentHTML}</div>
            <div class="resize-handle"></div>
        `;
        document.getElementById('app-wrapper').appendChild(div);

        const closeBtn = div.querySelector('.close-btn');
        const cover = div.querySelector('.monitor-cover');
        const header = div.querySelector('.monitor-header');
        const resizer = div.querySelector('.resize-handle');
        
        header.style.display = 'none';

        const monitorData = {
            element: div, baseX: localX, baseY: localY,
            baseW: localWidth, baseH: localHeight,
            baseTransform: baseTransform, state: 'docked'
        };
        monitors.push(monitorData);

        // Bind Resize Handle
        resizer.addEventListener('pointerdown', (e) => {
            if (monitorData.state !== 'centered') return;
            e.stopPropagation();
            activeResizingMonitor = div;
            div.classList.add('is-interacting');
            rStartX = e.clientX; rStartY = e.clientY;
            rStartW = div.offsetWidth; rStartH = div.offsetHeight;
            document.body.style.userSelect = 'none';
            document.body.style.cursor = 'nwse-resize';
        });

        // Bind Drag Handle (Header)
        header.addEventListener('pointerdown', (e) => {
            // Prevent dragging if they are clicking the close button
            if (e.target === closeBtn || monitorData.state !== 'centered') return;
            e.stopPropagation();
            
            activeDraggingMonitor = div;
            div.classList.add('is-interacting');
            
            dStartX = e.clientX; dStartY = e.clientY;
            const rect = div.getBoundingClientRect();
            dStartLeft = rect.left; dStartTop = rect.top;
            
            // Switch to absolute pixel positions so it doesn't jump
            div.style.transition = 'none'; 
            div.style.left = dStartLeft + 'px';
            div.style.top = dStartTop + 'px';
            
            document.body.style.userSelect = 'none';
        });

        const focusMe = () => {
            if (monitorData.state === 'centered' || monitorData.state === 'animating') return;
            if (div.classList.contains('power-off')) return;
            
            monitorData.state = 'animating';
            
            div.style.transition = 'none';
            div.style.transform = 'none';
            div.style.width = '85vw';
            div.style.height = '85vh';
            div.style.left = '7.5vw';
            div.style.top = '-100vh'; 
            div.style.zIndex = 200;
            div.style.fontSize = '16px';
            
            cover.style.display = 'none';
            header.style.display = 'flex';
            closeBtn.style.display = 'block';
            app.view.style.filter = 'blur(8px) brightness(0.4)';

            void div.offsetWidth; // Force Reflow

            div.style.transition = 'top 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.15)'; 
            div.style.top = '7.5vh'; 

            setTimeout(() => {
                monitorData.state = 'centered';
                div.classList.add('is-centered'); 
                const input = div.querySelector('input');
                if (input) input.focus();
            }, 750);
        };

        const dockMe = (e) => {
            if (e) e.stopPropagation();
            if (monitorData.state === 'docked' || monitorData.state === 'animating') return;
            monitorData.state = 'animating';
            div.classList.remove('is-centered'); 
            
            // Re-enable transition so it animates back up smoothly, even if dragged
            div.style.transition = 'top 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045)'; 
            div.style.top = '-100vh';
            app.view.style.filter = 'none';

            setTimeout(() => {
                div.style.transition = 'none';
                cover.style.display = 'flex';
                header.style.display = 'none';
                closeBtn.style.display = 'none';
                div.style.zIndex = 50;
                div.style.transform = monitorData.baseTransform;
                
                monitorData.state = 'docked';
                syncMonitors(); 
            }, 550);
        };

        cover.addEventListener('click', focusMe);
        closeBtn.addEventListener('click', dockMe);
        monitorData.dock = dockMe;
        return div;
    }

    function syncMonitors() {
        const scale = bgSprite.scale.x;
        const centerX = app.screen.width / 2;
        const centerY = app.screen.height / 2;
        if (scale === 0) return;

        monitors.forEach(m => {
            if (m.state === 'docked') {
                m.element.style.left = `${centerX + (m.baseX * scale)}px`;
                m.element.style.top = `${centerY + (m.baseY * scale)}px`;
                m.element.style.width = `${m.baseW * scale}px`;
                m.element.style.height = `${m.baseH * scale}px`;
                m.element.style.fontSize = `${12 * scale}px`;
                m.element.style.transform = m.baseTransform; 
            }
        });
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') monitors.forEach(m => m.dock());
    });

    // --- INSTANTIATE RETRO MONITORS ---
    createMonitorOverlay("mon-terminal", "TERMINAL", -990, 305, 160, 120, `
        <div class="retro-wrapper">
            <div class="retro-title">
                IBEX STAFFING SOLUTIONS<br>
                UNIFIED OPERATING SYSTEM<br>
                - NODE ALPHA -
            </div>
            <div id="term-log" class="term-log">
                Root access granted.<br>Type 'help' for system commands.<br><br>
            </div>
            <div class="term-input-row">
                > <input type="text" id="term-input" class="term-input" autocomplete="off" spellcheck="false" />
            </div>
        </div>
    `, 'perspective(800px) rotateY(20deg) skewY(-5deg)');

    createMonitorOverlay("mon-web", "WEBSITE", -784, 300, 220, 120, `
        <div class="retro-wrapper" style="padding: 0; padding-top: 15px;">
            <div class="retro-title" style="margin: 0 15px 10px 15px; flex-shrink: 0;">
                IBEX STAFFING SOLUTIONS PORTAL
            </div>
            <iframe src="https://goibex.it" class="website-iframe"></iframe>
        </div>
    `, 'none');

    createMonitorOverlay("mon-info", "SYS_OP", -515, 325, 160, 120, `
        <div class="retro-wrapper">
            <div class="retro-title">IBEX-OS(TM) V3.1.4 - SYSTEM DIAGNOSTICS</div>
            <div class="sys-grid">
                <div class="sys-block">
                    <div>STATUS: <span style="color:#1cf843; font-weight:bold;">ONLINE</span></div>
                    <div>UPTIME: <span id="info-uptime">00:00:00</span></div>
                    <br>
                    <div>ACTIVE UNITS: <span id="info-units">0</span></div>
                    <div>SECTOR: <span id="info-loc">LOCATING...</span></div>
                </div>
                <div class="sys-block">
                    <div>MEMORY USAGE</div>
                    <div class="ascii-bar"><span id="info-ram-bar">[----------]</span> <span id="info-ram">16</span>%</div>
                    <br>
                    <div>CPU LOAD</div>
                    <div class="ascii-bar"><span id="info-cpu-bar">[----------]</span> <span id="info-cpu">42</span>%</div>
                </div>
            </div>
            <div style="margin-top:auto; font-size: 0.9em; border-top: 1px dashed #1cf843; padding-top: 10px;">
                WORKFORCE EFFICIENCY: OPTIMAL <br>
                FACILITY STATUS: SECURE
            </div>
        </div>
    `, 'perspective(800px) rotateY(-20deg) skewY(8deg)');


    // --- 6. WIDGET LOGIC & UPDATES ---
    const termInput = document.getElementById('term-input');
    const termLog = document.getElementById('term-log');
    termInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = termInput.value.toUpperCase().trim();
            termLog.innerHTML += `<div>> ${cmd}</div>`;

            if (cmd === 'HELP') termLog.innerHTML += `<div style="color:#aaa;">CMDS: HELP, CLEAR, STATUS, PING, WHOAMI, OVERRIDE, EXIT</div>`;
            else if (cmd === 'CLEAR') termLog.innerHTML = ``;
            else if (cmd === 'STATUS') termLog.innerHTML += `<div>IBEX systems nominal. Conveyors active. No anomalies detected.</div>`;
            else if (cmd === 'PING') termLog.innerHTML += `<div>Host reachable. 0ms latency to mainframe.</div>`;
            else if (cmd === 'WHOAMI') termLog.innerHTML += `<div>SYS_ADMIN</div>`;
            else if (cmd === 'OVERRIDE') termLog.innerHTML += `<div><span style="color:red; text-shadow:0 0 5px red;">ACCESS DENIED.</span> Security credentials required.</div>`;
            else if (cmd === 'EXIT' || cmd === 'QUIT') {
                termLog.innerHTML += `<div>Terminating connection...</div>`;
                setTimeout(() => document.querySelector('#mon-terminal .close-btn').click(), 500);
            }
            else if (cmd !== '') termLog.innerHTML += `<div>Bad command or file name.</div>`;

            termInput.value = ''; 
            setTimeout(() => termLog.scrollTop = termLog.scrollHeight, 10);
        }
    });

    function getAsciiBar(percentage) {
        const totalBlocks = 10;
        const filled = Math.round((percentage / 100) * totalBlocks);
        let bar = "[";
        for(let i=0; i<totalBlocks; i++) { bar += (i < filled) ? "|" : "-"; }
        bar += "]";
        return bar;
    }

    let uptimeSeconds = 0;
    setInterval(() => {
        uptimeSeconds++;
        let h = Math.floor(uptimeSeconds / 3600).toString().padStart(2, '0');
        let m = Math.floor((uptimeSeconds % 3600) / 60).toString().padStart(2, '0');
        let s = (uptimeSeconds % 60).toString().padStart(2, '0');
        document.getElementById('info-uptime').innerText = `${h}:${m}:${s}`;

        let currCpu = parseInt(document.getElementById('info-cpu').innerText);
        let currRam = parseInt(document.getElementById('info-ram').innerText);
        let newCpu = Math.max(5, Math.min(99, currCpu + (Math.floor(Math.random() * 15) - 7))); 
        let newRam = Math.max(10, Math.min(99, currRam + (Math.floor(Math.random() * 5) - 2)));
        
        document.getElementById('info-cpu').innerText = newCpu.toString().padStart(2, '0');
        document.getElementById('info-ram').innerText = newRam.toString().padStart(2, '0');
        
        document.getElementById('info-cpu-bar').innerText = getAsciiBar(newCpu);
        document.getElementById('info-ram-bar').innerText = getAsciiBar(newRam);

        let unitCount = 0;
        entityLayer.children.forEach(c => { if(c.type) unitCount++; });
        document.getElementById('info-units').innerText = unitCount;

    }, 1000);

    async function fetchWeatherAndLocation() {
        const locEl = document.getElementById('info-loc');
        try {
            const geoRes = await fetch('https://freeipapi.com/api/json');
            const geoData = await geoRes.json();
            locEl.innerText = `${geoData.cityName.toUpperCase()}`;
        } catch (e) {
            locEl.innerText = "UNKNOWN SECTOR";
        }
    }
    fetchWeatherAndLocation();

    let loadSyncCount = 0;
    const loadSyncInterval = setInterval(() => {
        syncMonitors(); if (++loadSyncCount > 30) clearInterval(loadSyncInterval);
    }, 100);

    // --- 7. BUTTON HITBOXES & EASTER EGG ---
    let isAnimating = true, isFast = false;
    let easterEggTriggered = false;

    function triggerEasterEgg() {
        easterEggTriggered = true;
        entityLayer.children.forEach(c => c.interactive = false);
        monitors.forEach(m => m.dock());
        const overlay = document.getElementById('easter-egg-overlay');
        overlay.style.display = 'flex';

        setTimeout(() => {
            const appWrapper = document.getElementById('app-wrapper');
            appWrapper.classList.add('crt-shutdown');
            setTimeout(() => {
                entityLayer.children.forEach(c => {
                    c.gridX = c.initialGridX; c.gridY = c.initialGridY;
                    let pos = toIso(c.gridX, c.gridY);
                    c.x = pos.x; c.y = pos.y; c.zIndex = c.y; c.interactive = true;
                });
                isAnimating = true; isFast = false;
                entityLayer.children.forEach(e => { e.animationSpeed = 0.1; e.play(); });
                document.querySelectorAll('.monitor-overlay').forEach(el => el.classList.remove('power-off'));
                document.getElementById('coords-display').innerText = "SYSTEM: REBOOTED";
                document.getElementById('coords-display').style.color = "#4CAF50";

                overlay.style.display = 'none';
                appWrapper.classList.remove('crt-shutdown');
                appWrapper.classList.add('crt-turn-on');
                setTimeout(() => {
                    appWrapper.classList.remove('crt-turn-on');
                    easterEggTriggered = false;
                }, 1000);
            }, 2800);
        }, 3500); 
    }

    // --- GREEN BUTTON: POWER ON ---
    PIXI.Assets.load('pixilart-sprite.png').then((texture) => {
        const halfWidth = texture.width / 2;
        const fullHeight = texture.height;
        const normalTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(0, 0, halfWidth, fullHeight));
        const pressedTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(halfWidth, 0, halfWidth, fullHeight));

        const customStartBtn = new PIXI.Sprite(normalTex);
        customStartBtn.x = -1350;
        customStartBtn.y = 430;
        customStartBtn.scale.set(3);
        customStartBtn.interactive = true;
        customStartBtn.cursor = 'pointer';

        let isPressed = false;
        const pressDepth = 4;

        customStartBtn.on('pointerdown', () => {
            if (!isPressed) {
                customStartBtn.texture = pressedTex;
                customStartBtn.y += (pressDepth * customStartBtn.scale.y);
                isPressed = true;
            }
        });

        const releaseButton = () => {
            if (isPressed) {
                customStartBtn.texture = normalTex;
                customStartBtn.y -= (pressDepth * customStartBtn.scale.y);
                isPressed = false;
            }
        };

        customStartBtn.on('pointerup', () => {
            releaseButton();
            document.querySelectorAll('.monitor-overlay').forEach(el => el.classList.remove('power-off'));
            document.getElementById('coords-display').innerText = "SYSTEM: MONITORS ON";
            document.getElementById('coords-display').style.color = "#4CAF50";
        });

        customStartBtn.on('pointerupoutside', releaseButton);
        bgSprite.addChild(customStartBtn);
    });

    // --- RED BUTTON: POWER OFF ---
    PIXI.Assets.load('stop_btn.png').then((texture) => {
        const halfWidth = texture.width / 2;
        const fullHeight = texture.height;
        const normalTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(0, 0, halfWidth, fullHeight));
        const pressedTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(halfWidth, 0, halfWidth, fullHeight));

        const customStopBtn = new PIXI.Sprite(normalTex);
        customStopBtn.x = -1025;
        customStopBtn.y = 430;
        customStopBtn.scale.set(3);
        customStopBtn.interactive = true;
        customStopBtn.cursor = 'pointer';

        let isPressed = false;
        const pressDepth = 4;

        customStopBtn.on('pointerdown', () => {
            if (!isPressed) {
                customStopBtn.texture = pressedTex;
                customStopBtn.y += (pressDepth * customStopBtn.scale.y);
                isPressed = true;
            }
        });

        const releaseButton = () => {
            if (isPressed) {
                customStopBtn.texture = normalTex;
                customStopBtn.y -= (pressDepth * customStopBtn.scale.y);
                isPressed = false;
            }
        };

        customStopBtn.on('pointerup', () => {
            releaseButton();
            monitors.forEach(m => m.dock());
            document.querySelectorAll('.monitor-overlay').forEach(el => el.classList.add('power-off'));
            document.getElementById('coords-display').innerText = "SYSTEM: MONITORS OFF";
            document.getElementById('coords-display').style.color = "#ff5252";
        });

        customStopBtn.on('pointerupoutside', releaseButton);
        bgSprite.addChild(customStopBtn);
    });

    // --- TOGGLE ANIMATION BUTTON ---
    PIXI.Assets.load('toggle_btn.png').then((texture) => {
        const halfWidth = texture.width / 2;
        const fullHeight = texture.height;
        const normalTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(0, 0, halfWidth, fullHeight));
        const pressedTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(halfWidth, 0, halfWidth, fullHeight));

        const customToggleBtn = new PIXI.Sprite(normalTex);
        customToggleBtn.x = -690;
        customToggleBtn.y = 430;
        customToggleBtn.scale.set(3);
        customToggleBtn.interactive = true;
        customToggleBtn.cursor = 'pointer';

        let isPressed = false;
        const pressDepth = 4;

        customToggleBtn.on('pointerdown', () => {
            if (!isPressed) {
                customToggleBtn.texture = pressedTex;
                customToggleBtn.y += (pressDepth * customToggleBtn.scale.y);
                isPressed = true;
            }
        });

        const releaseButton = () => {
            if (isPressed) {
                customToggleBtn.texture = normalTex;
                customToggleBtn.y -= (pressDepth * customToggleBtn.scale.y);
                isPressed = false;
            }
        };

        customToggleBtn.on('pointerup', () => {
            releaseButton();
            isAnimating = !isAnimating;
            entityLayer.children.forEach(e => { if (isAnimating) e.play(); else e.stop(); });
            document.getElementById('coords-display').innerText = `SYSTEM: ${isAnimating ? 'RESUMED' : 'PAUSED'}`;
            document.getElementById('coords-display').style.color = isAnimating ? "#4CAF50" : "#ffb74d";
        });

        customToggleBtn.on('pointerupoutside', releaseButton);
        bgSprite.addChild(customToggleBtn);
    });

    // --- 8. ENTITY SYSTEM ---
    const swPaths = [ 'animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_001.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_002.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_003.png' ];
    const nePaths = [ 'animations/Breathing_Idle-c1b5dcec/north-east/frame_000.png', 'animations/Breathing_Idle-c1b5dcec/north-east/frame_001.png', 'animations/Breathing_Idle-c1b5dcec/north-east/frame_002.png', 'animations/Breathing_Idle-c1b5dcec/north-east/frame_003.png' ];
    const robotSEPaths = [ 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png', 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_001.png', 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_002.png', 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_003.png' ];

    PIXI.Assets.load([...swPaths, ...nePaths, ...robotSEPaths, 'hook-remove.png']).then((textures) => {
        const hookTex = textures['hook-remove.png'];
        const frameW = hookTex.width / 4; const frameH = hookTex.height / 2;
        const openClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(0, 0, frameW, frameH));
        const closedClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(frameW, 0, frameW, frameH));

        const claw = new PIXI.Sprite(openClawTex);
        claw.anchor.set(0.6, 1.2); claw.scale.set(1.5); claw.visible = false;
        fxLayer.addChild(claw);

        function createEntity(paths, gridX, gridY, type) {
            const entity = new PIXI.AnimatedSprite(paths.map(p => textures[p]));
            entity.animationSpeed = 0.1; entity.play();
            entity.anchor.set(0.5, 1); entity.scale.set(3);

            const hitWidth = textures[paths[0]].width * 0.30; 
            const hitHeight = textures[paths[0]].height * 0.80;
            entity.hitArea = new PIXI.Rectangle(-hitWidth / 2, -hitHeight, hitWidth, hitHeight);

            entity.initialGridX = gridX; entity.initialGridY = gridY; entity.type = type;

            const pos = toIso(gridX, gridY);
            entity.x = pos.x; entity.y = pos.y; entity.zIndex = entity.y;
            entityLayer.addChild(entity);

            entity.interactive = true; entity.cursor = 'grab';
            let dragging = false, dragOffset = { x: 0, y: 0 };

            entity.on('pointerdown', (e) => {
                if(easterEggTriggered) return;
                dragging = true; entity.isDragging = true;
                entity.cursor = 'grabbing'; entity.alpha = 0.8; entity.zIndex = 10000;
                dragOffset.x = entity.x - e.data.global.x; dragOffset.y = entity.y - e.data.global.y;
                claw.texture = closedClawTex; claw.visible = true;
                claw.x = entity.x; claw.y = entity.y - 30;
            });

            const endDrag = () => {
                if(!dragging) return;
                dragging = false; entity.isDragging = false;
                entity.cursor = 'grab'; entity.alpha = 1;
                claw.texture = openClawTex;
                setTimeout(() => { if (!dragging) claw.visible = false; }, 150);

                if (!easterEggTriggered) {
                    let robotsOnBelt = 0; let humansOnBelt = 0;
                    entityLayer.children.forEach(c => {
                        if (c.gridY >= 3.5 && c.gridY <= 6.0 && c.gridX >= -4 && c.gridX <= 12) {
                            if (c.type === 'robot') robotsOnBelt++;
                            if (c.type === 'human') humansOnBelt++;
                        }
                    });
                    if (robotsOnBelt === 0 && humansOnBelt >= 4) triggerEasterEgg();
                }
            };

            entity.on('pointerup', endDrag);
            entity.on('pointerupoutside', endDrag);

            entity.on('globalpointermove', (e) => {
                if (dragging) {
                    entity.x = e.data.global.x + dragOffset.x; entity.y = e.data.global.y + dragOffset.y;
                    claw.x = entity.x; claw.y = entity.y - 30;
                    const cart = toCart(entity.x, entity.y);
                    entity.gridX = cart.x; entity.gridY = cart.y;
                    document.getElementById('coords-display').innerText = `X: ${cart.x.toFixed(1)} | Y: ${cart.y.toFixed(1)}`;
                }
            });
            return entity;
        }

        createEntity(swPaths, -1.5, 2.6, 'human');
        createEntity(swPaths, 4.3, 3.0, 'human');
        createEntity(nePaths, 0.0, 8.0, 'human');
        createEntity(nePaths, 6.8, 8.1, 'human');
        createEntity(robotSEPaths, -1.3, 4.5, 'robot');
        createEntity(robotSEPaths, 1.0, 4.6, 'robot');
        createEntity(robotSEPaths, 3.5, 4.8, 'robot');
        createEntity(robotSEPaths, 6.6, 4.8, 'robot');
    });

    app.ticker.add(() => {
        entityLayer.children.forEach(c => { if (!c.isDragging) c.zIndex = c.y; });
    });
</script>
