<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEX Factory Floor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* CSS reset and full screen setup */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #121214; color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Upgraded sleek Glassmorphism UI panel */
        #ui-panel { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(30, 30, 36, 0.85); padding: 15px 25px; 
            border-radius: 12px; font-size: 14px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .panel-title { 
            font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1.5px; color: #aaa; margin-bottom: 6px; 
        }
        .panel-data { 
            font-size: 22px; font-weight: bold; 
            color: #4CAF50; font-family: 'Courier New', Courier, monospace;
        }

        /* Monitor Overlays */
        .monitor-overlay {
            position: absolute;
            background: rgba(10, 20, 10, 0.85); /* Dark terminal background */
            border: 2px solid #4CAF50; /* Green casing */
            border-radius: 4px;
            color: #4CAF50; /* Terminal green text */
            font-family: 'Courier New', Courier, monospace;
            padding: 8px;
            box-sizing: border-box;
            overflow: hidden;
            pointer-events: auto; /* Make them clickable */
            z-index: 5; /* Keep them above the canvas */
            transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.2);
        }

        .monitor-overlay:hover {
            border-color: #81C784;
            background: rgba(15, 30, 15, 0.95);
        }

        /* Custom styles for the inner monitor contents */
        .term-input {
            width: 100%;
            background: transparent;
            color: #4CAF50;
            border: none;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 5px;
            font-size: inherit;
        }
        .term-log {
            height: calc(100% - 25px);
            overflow-y: auto;
            word-wrap: break-word;
        }
        .term-log::-webkit-scrollbar { display: none; }
        
        .monitor-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            pointer-events: auto;
        }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div class="panel-title">Active Entity Position</div>
    <div class="panel-data" id="coords-display">X: -- | Y: --</div>
</div>

<script>
    // 1. Initialize Full-Screen Application
    const app = new PIXI.Application({ 
        resizeTo: window, 
        backgroundColor: 0x121214 
    });
    document.body.appendChild(app.view);

    // 2. Scene Layers
    const backgroundLayer = new PIXI.Container();
    const gridLayer = new PIXI.Container();
    const entityLayer = new PIXI.Container();
    
    app.stage.addChild(backgroundLayer);
    app.stage.addChild(gridLayer);
    app.stage.addChild(entityLayer);

    // --- 3. BACKGROUND SETUP ---
    const bgSprite = PIXI.Sprite.from('gemini_background.png'); 
    bgSprite.anchor.set(0.5, 0.5); 
    
    function resizeBackground() {
        bgSprite.x = app.screen.width / 2;
        bgSprite.y = app.screen.height / 2;
        
        const scaleX = app.screen.width / (bgSprite.texture.width || 1);
        const scaleY = app.screen.height / (bgSprite.texture.height || 1);
        const scale = Math.max(scaleX, scaleY);
        
        bgSprite.scale.set(scale); 
    }

    bgSprite.texture.baseTexture.on('loaded', resizeBackground);
    window.addEventListener('resize', resizeBackground);
    backgroundLayer.addChild(bgSprite);

    // --- 3.5. UI BUTTON HITBOXES ---
    const DEBUG_BUTTONS = false; // Keep false to hide the boxes but keep the click effect

    function createButtonHitbox(id, x, y, width, height, onClick) {
        const hitbox = new PIXI.Graphics();
        
        hitbox.beginFill(0x000000); 
        hitbox.drawRect(x, y, width, height);
        hitbox.endFill();

        hitbox.alpha = DEBUG_BUTTONS ? 0.3 : 0.0;
        hitbox.interactive = true;
        hitbox.cursor = 'pointer';

        hitbox.on('pointerdown', () => { hitbox.alpha = 0.6; });
        hitbox.on('pointerup', () => { 
            hitbox.alpha = DEBUG_BUTTONS ? 0.3 : 0.0; 
            if (onClick) onClick(); 
        });
        hitbox.on('pointerupoutside', () => { hitbox.alpha = DEBUG_BUTTONS ? 0.3 : 0.0; });

        bgSprite.addChild(hitbox);
        return hitbox;
    }

    // Your exact button coordinates
    createButtonHitbox("SPEED UP", -1300, 510, 120, 120, () => {
        entityLayer.children.forEach(entity => { entity.animationSpeed = 0.2; });
        document.getElementById('coords-display').innerHTML = "STATUS: SPEEDING UP";
        document.getElementById('coords-display').style.color = "#ffff00";
    }); 
    createButtonHitbox("HALT", -1135, 510, 120, 120, () => {
        entityLayer.children.forEach(entity => { entity.stop(); });
        document.getElementById('coords-display').innerHTML = "STATUS: HALTED";
        document.getElementById('coords-display').style.color = "#ff0000";
    }); 
    createButtonHitbox("NEW PART", -965, 510, 120, 120, () => {
        entityLayer.children.forEach(entity => {
            entity.animationSpeed = 0.08 + (Math.random() * 0.04);
            entity.play(); 
        });
        document.getElementById('coords-display').innerHTML = "STATUS: NORMAL YIELD";
        document.getElementById('coords-display').style.color = "#4CAF50";
    }); 
    createButtonHitbox("NEW MECHANISM", -795, 510, 120, 120, () => {
        alert("Deploying New Mechanism protocol!");
    }); 


    // --- 4. ISOMETRIC MATH ENGINE ---
    let TILE_W = 128; 
    let TILE_H = 64;  
    let ORIGIN_X = app.screen.width / 2; 
    let ORIGIN_Y = app.screen.height * 0.3; 

    window.addEventListener('resize', () => {
        ORIGIN_X = app.screen.width / 2;
        ORIGIN_Y = app.screen.height * 0.3; 
    });

    function toIso(cartX, cartY) {
        return {
            x: (cartX - cartY) * (TILE_W / 2) + ORIGIN_X,
            y: (cartX + cartY) * (TILE_H / 2) + ORIGIN_Y
        };
    }

    function toCart(screenX, screenY) {
        let adjX = screenX - ORIGIN_X;
        let adjY = screenY - ORIGIN_Y;
        let cartX = (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2;
        let cartY = (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2;
        return { x: cartX, y: cartY };
    }

    // --- 5. HTML MONITOR OVERLAYS ---
    const monitors = [];

    function createMonitorOverlay(id, localX, localY, localWidth, localHeight, contentHTML) {
        const div = document.createElement('div');
        div.className = 'monitor-overlay';
        div.id = id;
        div.innerHTML = contentHTML;
        document.body.appendChild(div);

        const monitorData = {
            element: div, localX: localX, localY: localY,
            localWidth: localWidth, localHeight: localHeight,
            isExpanded: false
        };
        monitors.push(monitorData);

        div.addEventListener('click', (e) => {
            if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'iframe') return;
            
            monitorData.isExpanded = !monitorData.isExpanded;
            if (monitorData.isExpanded) {
                monitorData.localWidth *= 1.8; 
                monitorData.localHeight *= 1.8;
                div.style.zIndex = 20;
            } else {
                monitorData.localWidth /= 1.8;
                monitorData.localHeight /= 1.8;
                div.style.zIndex = 5;
            }
            syncMonitors(); 
        });

        return div;
    }

    function syncMonitors() {
        const scale = bgSprite.scale.x; 
        const centerX = app.screen.width / 2;
        const centerY = app.screen.height / 2;

        monitors.forEach(m => {
            const absX = centerX + (m.localX * scale);
            const absY = centerY + (m.localY * scale);
            m.element.style.left = `${absX}px`;
            m.element.style.top = `${absY}px`;
            m.element.style.width = `${m.localWidth * scale}px`;
            m.element.style.height = `${m.localHeight * scale}px`;
            m.element.style.fontSize = `${12 * scale}px`; 
        });
    }

    // You will need to TWEAK THESE coordinates to match the screens on your specific background image!
    createMonitorOverlay("mon-terminal", -1030, 300, 170, 120, `
        <div id="term-log" class="term-log">IBEX OS v3.1<br/>Awaiting input...<br/></div>
        <input type="text" id="term-input" class="term-input" placeholder=">_" autocomplete="off" />
    `);
    createMonitorOverlay("mon-web", -815, 300, 220, 120, `
        <iframe class="monitor-iframe" src="https://en.wikipedia.org/wiki/Automation"></iframe>
    `);
    createMonitorOverlay("mon-info", -530, 320, 150, 120, `
        <div>SYS: ONLINE</div>
        <div id="info-time" style="margin-top: 10px; font-weight: bold;">--:--:--</div>
        <div id="info-loc" style="margin-top: 10px; color:#81C784;">Locating...</div>
        <div id="info-weather" style="margin-top: 5px;">Temp: --</div>
    `);

    // Terminal Logic
    const termInput = document.getElementById('term-input');
    const termLog = document.getElementById('term-log');
    termInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = termInput.value.toLowerCase().trim();
            termLog.innerHTML += `<div>> ${cmd}</div>`;
            if (cmd === 'help') termLog.innerHTML += `<div>Commands: help, clear, status, ping</div>`;
            else if (cmd === 'clear') termLog.innerHTML = `IBEX OS v3.1<br/>`;
            else if (cmd === 'status') termLog.innerHTML += `<div>All systems nominal.</div>`;
            else if (cmd === 'ping') termLog.innerHTML += `<div>Pong! 24ms</div>`;
            else if (cmd !== '') termLog.innerHTML += `<div style="color:red;">Command not found</div>`;
            termInput.value = ''; 
            termLog.scrollTop = termLog.scrollHeight; 
        }
    });

    // Clock Logic
    setInterval(() => {
        const now = new Date();
        document.getElementById('info-time').innerText = now.toLocaleTimeString();
    }, 1000);

    // Weather API Logic
    async function fetchWeatherAndLocation() {
        try {
            const geoRes = await fetch('https://ipapi.co/json/');
            const geoData = await geoRes.json();
            document.getElementById('info-loc').innerText = `${geoData.city}, ${geoData.country_code}`;

            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geoData.latitude}&longitude=${geoData.longitude}&current_weather=true`);
            const weatherData = await weatherRes.json();
            document.getElementById('info-weather').innerText = `Temp: ${weatherData.current_weather.temperature}°C`;
        } catch (error) {
            document.getElementById('info-loc').innerText = "Loc: Offline";
            document.getElementById('info-weather').innerText = "Temp: Offline";
        }
    }
    fetchWeatherAndLocation();

    window.addEventListener('resize', syncMonitors);
    setTimeout(syncMonitors, 100);


    // --- 6. ASSET LOADING & ANIMATION ---
    const swPaths = [
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_001.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_002.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_003.png'
    ];

    const nePaths = [
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_000.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_001.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_002.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_003.png'
    ];

    const robotSEPaths = [
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_001.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_002.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_003.png',
    ];

    PIXI.Assets.load([...swPaths, ...nePaths, ...robotSEPaths]).then((textures) => {
        const framesSW = swPaths.map(path => textures[path]);
        const framesNE = nePaths.map(path => textures[path]);
        const framesRobotSE = robotSEPaths.map(path => textures[path]);

        function createEntity(framesArray, gridX, gridY) {
            const entity = new PIXI.AnimatedSprite(framesArray);
            
            entity.animationSpeed = 0.08 + (Math.random() * 0.04); 
            entity.play();

            entity.anchor.set(0.5, 1); 
            entity.scale.set(3); 

            entity.gridX = gridX;
            entity.gridY = gridY;
            let pos = toIso(gridX, gridY);
            entity.x = pos.x;
            entity.y = pos.y;
            
            entityLayer.addChild(entity);

            entity.interactive = true;
            entity.cursor = 'grab';
            
            let dragging = false;
            let dragOffset = { x: 0, y: 0 };

            entity.on('pointerdown', (e) => {
                dragging = true;
                entity.cursor = 'grabbing';
                entity.alpha = 0.85;
                
                entityLayer.setChildIndex(entity, entityLayer.children.length - 1);
                
                dragOffset.x = entity.x - e.data.global.x;
                dragOffset.y = entity.y - e.data.global.y;
            });

            const resetDrag = () => { dragging = false; entity.cursor = 'grab'; entity.alpha = 1; };
            entity.on('pointerup', resetDrag);
            entity.on('pointerupoutside', resetDrag);

            entity.on('pointermove', (e) => {
                if (dragging) {
                    entity.x = e.data.global.x + dragOffset.x;
                    entity.y = e.data.global.y + dragOffset.y;
                    
                    let newGrid = toCart(entity.x, entity.y);
                    entity.gridX = newGrid.x;
                    entity.gridY = newGrid.y;
                    
                    document.getElementById('coords-display').innerHTML = `X: ${entity.gridX.toFixed(1)} | Y: ${entity.gridY.toFixed(1)}`;
                }
            });
            
            return entity;
        }

        // Your exact Entity coordinates
        createEntity(framesSW, -1.5, 2.6);
        createEntity(framesSW, 4.3, 3.0);
        createEntity(framesSW, 11.6, 2.7);
        
        createEntity(framesNE, 0.0, 8.0);
        createEntity(framesNE, 6.8, 8.1);
        createEntity(framesNE, 12.2, 8.2);

        createEntity(framesRobotSE, -1.3, 4.5);
        createEntity(framesRobotSE, 1.0, 4.6);
        createEntity(framesRobotSE, 3.5, 4.8);
        createEntity(framesRobotSE, 6.6, 4.8);

    }).catch((err) => {
        console.error("Asset Load Error. Check your animation folder paths!", err);
    });

    // --- 7. DEPTH SORTING ---
    app.ticker.add(() => {
        entityLayer.children.sort((a, b) => a.y - b.y);
    });

</script>
</body>
</html>
