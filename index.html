<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEX Factory Floor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* CSS reset and full screen setup */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #121214; color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Upgraded sleek Glassmorphism UI panel */
        #ui-panel { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(30, 30, 36, 0.85); padding: 15px 25px; 
            border-radius: 12px; font-size: 14px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .panel-title { 
            font-size: 11px; text-transform: uppercase; 
            letter-spacing: 1.5px; color: #aaa; margin-bottom: 6px; 
        }
        .panel-data { 
            font-size: 22px; font-weight: bold; 
            color: #4CAF50; font-family: 'Courier New', Courier, monospace;
        }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div class="panel-title">Active Entity Position</div>
    <div class="panel-data" id="coords-display">X: -- | Y: --</div>
</div>

<script>
    // 1. Initialize Full-Screen Application
    const app = new PIXI.Application({ 
        resizeTo: window, 
        backgroundColor: 0x121214 
    });
    document.body.appendChild(app.view);

    // 2. Scene Layers
    const backgroundLayer = new PIXI.Container();
    const gridLayer = new PIXI.Container();
    const entityLayer = new PIXI.Container();
    
    app.stage.addChild(backgroundLayer);
    app.stage.addChild(gridLayer);
    app.stage.addChild(entityLayer);

    // --- 3. BACKGROUND SETUP ---
    const bgSprite = PIXI.Sprite.from('gemini_background.png'); 
    bgSprite.anchor.set(0.5, 0.5); 
    
    function resizeBackground() {
        bgSprite.x = app.screen.width / 2;
        bgSprite.y = app.screen.height / 2;
        
        const scaleX = app.screen.width / (bgSprite.texture.width || 1);
        const scaleY = app.screen.height / (bgSprite.texture.height || 1);
        const scale = Math.max(scaleX, scaleY);
        
        bgSprite.scale.set(scale); 
    }

    bgSprite.texture.baseTexture.on('loaded', resizeBackground);
    window.addEventListener('resize', resizeBackground);
    backgroundLayer.addChild(bgSprite);

    // --- 4. ISOMETRIC MATH ENGINE ---
    let TILE_W = 128; 
    let TILE_H = 64;  
    let ORIGIN_X = app.screen.width / 2; 
    let ORIGIN_Y = app.screen.height * 0.3; 

    window.addEventListener('resize', () => {
        ORIGIN_X = app.screen.width / 2;
        ORIGIN_Y = app.screen.height * 0.3; 
    });

    function toIso(cartX, cartY) {
        return {
            x: (cartX - cartY) * (TILE_W / 2) + ORIGIN_X,
            y: (cartX + cartY) * (TILE_H / 2) + ORIGIN_Y
        };
    }

    function toCart(screenX, screenY) {
        let adjX = screenX - ORIGIN_X;
        let adjY = screenY - ORIGIN_Y;
        let cartX = (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2;
        let cartY = (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2;
        return { x: cartX, y: cartY };
    }

    // --- 5. ASSET LOADING & ANIMATION ---
    const swPaths = [
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_001.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_002.png',
        'animations/Breathing_Idle-c1b5dcec/south-west/frame_003.png'
    ];

    const nePaths = [
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_000.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_001.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_002.png',
        'animations/Breathing_Idle-c1b5dcec/north-east/frame_003.png'
    ];

    const robotSEPaths = [
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_001.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_002.png',
        'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_003.png',
    ];

    PIXI.Assets.load([...swPaths, ...nePaths, ...robotSEPaths]).then((textures) => {
        const framesSW = swPaths.map(path => textures[path]);
        const framesNE = nePaths.map(path => textures[path]);
        const framesRobotSE = robotSEPaths.map(path => textures[path]);

        function createEntity(framesArray, gridX, gridY) {
            const entity = new PIXI.AnimatedSprite(framesArray);
            
            // Randomize animation slightly
            entity.animationSpeed = 0.08 + (Math.random() * 0.04); 
            entity.play();

            entity.anchor.set(0.5, 1); 
            entity.scale.set(3); // Keep scaling consistent

            // Positioning
            entity.gridX = gridX;
            entity.gridY = gridY;
            let pos = toIso(gridX, gridY);
            entity.x = pos.x;
            entity.y = pos.y;
            
            entityLayer.addChild(entity);

            // Drag Interactions
            entity.interactive = true;
            entity.cursor = 'grab';
            
            let dragging = false;
            let dragOffset = { x: 0, y: 0 };

            entity.on('pointerdown', (e) => {
                dragging = true;
                entity.cursor = 'grabbing';
                entity.alpha = 0.85;
                
                // Pop to front
                entityLayer.setChildIndex(entity, entityLayer.children.length - 1);
                
                dragOffset.x = entity.x - e.data.global.x;
                dragOffset.y = entity.y - e.data.global.y;
            });

            const resetDrag = () => { dragging = false; entity.cursor = 'grab'; entity.alpha = 1; };
            entity.on('pointerup', resetDrag);
            entity.on('pointerupoutside', resetDrag);

            entity.on('pointermove', (e) => {
                if (dragging) {
                    entity.x = e.data.global.x + dragOffset.x;
                    entity.y = e.data.global.y + dragOffset.y;
                    
                    let newGrid = toCart(entity.x, entity.y);
                    entity.gridX = newGrid.x;
                    entity.gridY = newGrid.y;
                    
                    document.getElementById('coords-display').innerHTML = `X: ${entity.gridX.toFixed(1)} | Y: ${entity.gridY.toFixed(1)}`;
                }
            });
            
            return entity;
        }

        // Spawn Human Workers (South-West)
        createEntity(framesSW, -1.4, 2.6);
        createEntity(framesSW, 4.6, 3.0);
        createEntity(framesSW, 11.3, 3.8);
        
        // Spawn Human Workers (North-East)
        createEntity(framesNE, 0.0, 8.0);
        createEntity(framesNE, 6.8, 8.1);
        createEntity(framesNE, 12.2, 8.2);

        // Spawn Robots (South-East)
        createEntity(framesRobotSE, -1.7, 4.5);
        createEntity(framesRobotSE, 0.5, 4.7);
        createEntity(framesRobotSE, 3.9, 4.8);
        createEntity(framesRobotSE, 8.5, 4.7);

    }).catch((err) => {
        console.error("Asset Load Error. Check your animation folder paths!", err);
    });

    // --- 7. DEPTH SORTING ---
    app.ticker.add(() => {
        entityLayer.children.sort((a, b) => a.y - b.y);
    });

</script>
</body>
</html>
