<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEX Staffing Solutions - Factory Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* --- 1. GLOBAL & UI STYLES --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0a0a0c; /* Sleek Dark Canvas Color */
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app-wrapper {
            width: 100vw; height: 100vh; overflow: hidden;
            position: relative; transform-origin: center center;
        }

      /* --- CRT / PHOSPHOR MASK OVERLAY --- */
        #app-wrapper::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 8000;
            pointer-events: none;
            
            /* 1. Horizontal Scanlines, 2. Vertical RGB Phosphor dots */
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.08), rgba(0, 255, 0, 0.04), rgba(0, 0, 255, 0.08));
            background-size: 100% 4px, 6px 100%;
            
            /* Vignette to make it look like a curved glass tube */
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);
        }
        
        /* Force the PixiJS canvas to stay crunchy when we stretch it! */
        canvas {
            image-rendering: pixelated;
        } 

        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(11, 12, 16, 0.85); padding: 15px 25px;
            border-radius: 8px; font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.2);
            pointer-events: none; z-index: 100;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .panel-title {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 1.5px; color: #81C784; margin-bottom: 6px;
        }
        .panel-data {
            font-size: 22px; font-weight: bold;
            color: #4CAF50; font-family: 'Courier New', Courier, monospace;
        }

        /* --- EASTER EGG OVERLAY --- */
        #easter-egg-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(15, 0, 0, 0.95); z-index: 9000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .warning-text {
            color: #ff1111; font-family: 'Courier New', Courier, monospace;
            font-size: 3.5vw; text-align: center; font-weight: bold;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            animation: warning-blink 1.2s steps(2, start) infinite;
        }
        @keyframes warning-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .crt-shutdown { animation: crt-power-off 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .crt-turn-on { animation: crt-power-on 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes crt-power-off {
            0% { transform: scale(1, 1); opacity: 1; filter: brightness(1) contrast(1); }
            30% { transform: scale(1, 0.005); opacity: 1; filter: brightness(5) contrast(3); }
            70% { transform: scale(0.005, 0.005); opacity: 1; filter: brightness(5); }
            100% { transform: scale(0, 0); opacity: 0; filter: brightness(0); }
        }
        @keyframes crt-power-on {
            0% { transform: scale(0, 0); opacity: 0; filter: brightness(0); }
            40% { transform: scale(0.005, 0.005); opacity: 1; filter: brightness(5); }
            70% { transform: scale(1, 0.005); opacity: 1; filter: brightness(5) contrast(3); }
            100% { transform: scale(1, 1); opacity: 1; filter: brightness(1) contrast(1); }
        }

        /* --- 2. DOCKED MONITOR OVERLAYS --- */
        .monitor-overlay {
            position: absolute;
            background: #020602;
            border: 4px solid #113311;
            box-sizing: border-box; overflow: hidden;
            pointer-events: auto; z-index: 50;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0,0,0,1);
            transform-origin: center center;
        }

        .monitor-overlay.power-off {
            background: rgba(5, 5, 5, 0.95) !important;
            border-color: rgba(30, 30, 30, 0.8) !important;
            box-shadow: inset 0 0 50px rgba(0,0,0,1) !important;
            pointer-events: none !important;
        }

        .monitor-overlay > * { transition: opacity 0.3s ease; }
        .monitor-overlay.power-off > * { opacity: 0 !important; }

        .monitor-cover {
            position: absolute; inset: 0; background: #050a05;
            z-index: 60; display: flex; align-items: center; justify-content: center; text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.2em; font-weight: bold; letter-spacing: 2px; color: #1cf843;
            text-shadow: 0 0 10px rgba(28, 248, 67, 0.8);
            border: 2px solid #113311;
            box-shadow: inset 0 0 20px rgba(28, 248, 67, 0.1);
            transition: opacity 0.2s ease; cursor: pointer;
        }
        .monitor-cover:hover {
            background: #0a140a;
            box-shadow: inset 0 0 30px rgba(28, 248, 67, 0.3);
        }

        /* --- 3. IMMERSIVE HARDWARE STYLING --- */
        .monitor-overlay.is-centered {
            width: 90vw !important; max-width: 1800px;
            height: 90vh !important; max-height: 1200px;
            left: 5vw !important;
            
            border: 6px solid #000;
            border-radius: 12px;
            background-color: #556b47;
            padding: 1.5rem 1.5rem 6rem 1.5rem; 
            
            box-shadow: 
                inset 8px 8px 0 rgba(255,255,255,0.2), 
                inset -8px -8px 0 rgba(0,0,0,0.4),
                30px 30px 0 rgba(0,0,0,0.6);
            transform: none !important;
        }
        
        .monitor-overlay.is-centered#mon-web { background-color: #b0b0a0; }
        .monitor-overlay.is-centered#mon-security { background-color: #3b3d40; }

        .hardware-bezel {
            flex-grow: 1; display: flex; flex-direction: column;
            background: #000;
            border: 6px solid #000;
            border-radius: 8px;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
            overflow: hidden; position: relative;
        }

        .monitor-body { 
            flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; 
            opacity: 1; transition: opacity 0.6s ease;
        }
        .is-booting .monitor-body {
            opacity: 0; pointer-events: none;
            transition: none !important;
        }

        .hardware-controls {
            position: absolute; bottom: 0; left: 0; right: 0; height: 6rem;
            display: none; align-items: center; justify-content: space-between; padding: 0 3rem;
        }
        .monitor-overlay.is-centered .hardware-controls { display: flex; }

        .hw-logo {
            font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.5rem;
            color: rgba(0,0,0,0.5); text-shadow: 1px 1px 0px rgba(255,255,255,0.2); letter-spacing: 2px;
        }
        .hw-vent {
            width: 15rem; height: 1.5rem; opacity: 0.7;
            background: repeating-linear-gradient(to right, #000, #000 4px, transparent 4px, transparent 10px);
        }
        .hw-power-btn {
            background: #d32f2f; color: #fff; font-family: 'Courier New', Courier, monospace;
            border: 4px solid #000; padding: 0.5rem 1rem; font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: inset 4px 4px 0 #ff6666, inset -4px -4px 0 #990000;
            transition: all 0.1s;
        }
        .hw-power-btn:active { box-shadow: inset 4px 4px 0 #990000, inset -4px -4px 0 #ff6666; transform: translateY(2px); }
        .monitor-header { display: none; }

        /* --- 4. RETRO UI STYLES --- */
        .retro-wrapper {
            background-color: #040c04; color: #1cf843;
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            text-shadow: 0 0 6px rgba(28, 248, 67, 0.8);
            height: 100%; width: 100%; position: relative;
            padding: 30px; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column; 
            font-size: 2.5em; 
            line-height: 1.3;
        }

        .retro-wrapper::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }

        .retro-title { margin-bottom: 15px; border-bottom: 2px solid #1cf843; padding-bottom: 10px; font-size: 1.1em; text-transform: uppercase; flex-shrink: 0; padding-right: 80px; }
        .website-iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #fff; z-index: 2; position: relative; }

        /* --- SLIDER FABRICATION UI --- */
        .slider-controls {
            display: flex; align-items: center; justify-content: center; gap: 40px; 
            flex-grow: 1; z-index: 2; position: relative; padding: 20px 0;
        }
        
        .slider-btn {
            font-size: 2.5em; cursor: pointer; color: #1cf843; 
            transition: transform 0.1s; user-select: none;
        }
        .slider-btn:hover { text-shadow: 0 0 15px #1cf843; transform: scale(1.1); }
        .slider-btn:active { transform: scale(0.9); }
        
        .robot-display {
            display: flex; flex-direction: column; align-items: center; 
            border: 2px dashed #1cf843; padding: 30px; width: 400px; 
            background: rgba(28, 248, 67, 0.05); box-shadow: inset 0 0 20px rgba(28, 248, 67, 0.1);
        }
        .robot-large-thumb {
            width: 250px; height: 250px; background-size: contain; 
            background-repeat: no-repeat; background-position: center; image-rendering: pixelated;
        }
        .robot-large-name { font-size: 1.2em; text-align: center; margin-top: 20px; letter-spacing: 2px; }

        /* Target Selector Buttons */
        .target-selection {
            display: flex; gap: 20px; align-items: center; justify-content: center; 
            margin-bottom: 30px; z-index: 2; position: relative; font-size: 1.1em;
        }
        .target-btn {
            cursor: pointer; padding: 5px 15px; border: 2px solid transparent; 
            transition: all 0.2s; user-select: none;
        }
        .target-btn:hover { background: rgba(28, 248, 67, 0.2); }
        .target-btn.selected {
            border-color: #1cf843; background: #1cf843; color: #040c04; text-shadow: none; font-weight: bold;
        }

        .deploy-btn {
            border: 2px solid #1cf843; padding: 10px 20px; cursor: pointer; transition: all 0.2s;
            font-size: 1em; text-align: center; width: max-content; background: rgba(28, 248, 67, 0.1);
        }
        .deploy-btn:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 15px #1cf843; }
        .deploy-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* --- MINIGAME / MENU STYLES --- */
        .hack-container { display: flex; gap: 2em; letter-spacing: 2px; height: 100%; z-index: 2; position: relative; overflow: hidden; }
        .hack-main { flex-grow: 1; display: flex; gap: 1.5em; overflow-y: hidden; }
        .hack-column { display: flex; flex-direction: column; width: 50%; }
        @keyframes row-appear { 0% { opacity: 0; transform: translateX(-5px); } 100% { opacity: 1; transform: translateX(0); } }
        .hack-row { display: flex; gap: 1em; margin-bottom: 1px; opacity: 0; animation: row-appear 0.15s ease forwards; }
        .hack-hex { opacity: 0.6; }
        .hack-word { cursor: pointer; transition: background 0.1s, color 0.1s; position: relative; display: inline-block;}
        .hack-word:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 8px #1cf843; }
        
        .hack-log-panel { width: 18em; min-width: 250px; border-left: 2px dashed rgba(28, 248, 67, 0.5); padding-left: 1.5em; display: flex; flex-direction: column; }
        
        .hack-attempts { margin-bottom: 1em; }
        .hack-output { flex-grow: 1; overflow-y: auto; font-size: 0.9em; line-height: 1.5; word-wrap: break-word; }
        .hack-hover-display { margin-top: auto; border-top: 1px solid #1cf843; padding-top: 0.8em; min-height: 1.5em; font-weight: bold; }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor-block { display: inline-block; animation: blink-cursor 1s infinite; }
        
        .portal-menu { z-index: 2; position: relative; display: flex; flex-direction: column; gap: 0.8em; font-size: 1.1em; }
        .portal-item { cursor: pointer; padding: 0.3em; display: inline-block; transition: all 0.2s; width: max-content;}
        .portal-item:hover { background: #1cf843; color: #040c04; text-shadow: none; }
        .portal-content { z-index: 2; position: relative; display: flex; gap: 2em; height: 100%; flex-direction: column;}
        .portal-body { display: flex; gap: 2em; }
        .portal-text { flex: 1; font-size: 1.1em; line-height: 1.6; }
        .portal-art { flex: 1; white-space: pre; font-size: 0.8em; line-height: 1.2em; color: #1cf843; }
        .portal-back { margin-top: auto; cursor: pointer; width: max-content; padding: 0.5em; border: 1px solid #1cf843; }
        .portal-back:hover { background: #1cf843; color: #040c04; text-shadow: none; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="ui-panel">
        <div class="panel-title">Active Entity Position</div>
        <div class="panel-data" id="coords-display">X: -- | Y: --</div>
    </div>

    <div id="easter-egg-overlay">
        <div class="warning-text">
            ROBOTS HAVE ASSUMED CONTROL.<br><br>SHUTTING THE SYSTEMS DOWN<br>AND REBOOTING...
        </div>
    </div>
</div>

<script>
    // ============================================================================
    // ⚙️ ROBOT DATABASE
    // ============================================================================
    const ROBOT_DATABASE = [
        {
            id: 'robot_base',
            name: 'WORKER UNIT (BASE)',
            thumb: 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png',
            paths: [
                'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png',
                'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_001.png',
                'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_002.png',
                'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_003.png'
            ]
        },
        {
            id: 'robot_v1',
            name: 'SECURITY UNIT (V1)',
            thumb: 'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_000.png', 
            paths: [
             'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_000.png', 
             'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_001.png', 
             'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_002.png', 
             'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_003.png', 
            ]
        },
    ];

    window.pendingDeployment = null;

    // --- 1. PIXI INITIALIZATION & LAYERS ---
    PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
    
    const app = new PIXI.Application({ 
        resizeTo: window, 
        backgroundColor: 0x0a0a0c,
        resolution: 0.35,  /* <-- THIS IS THE MAGIC CHUNKY NUMBER! */
        autoDensity: true 
    });

    
    document.getElementById('app-wrapper').appendChild(app.view);

    const backgroundLayer = new PIXI.Container();
    const entityLayer = new PIXI.Container();
    entityLayer.sortableChildren = true; 
    const uiLayer = new PIXI.Container(); 

    app.stage.addChild(backgroundLayer);
    app.stage.addChild(entityLayer);
    app.stage.addChild(uiLayer); 


    // --- 🌟 CUSTOM 16-BIT COLOR SHADER 🌟 ---
    const colorShader = `
        varying vec2 vTextureCoord;
        uniform sampler2D uSampler;
        uniform float colorSteps;

        void main(void) {
            // Get the original high-def pixel color
            vec4 color = texture2D(uSampler, vTextureCoord);
            
            // Crush the RGB values into strict steps
            color.r = floor(color.r * colorSteps) / colorSteps;
            color.g = floor(color.g * colorSteps) / colorSteps;
            color.b = floor(color.b * colorSteps) / colorSteps;
            
            gl_FragColor = color;
        }
    `;

    // 16.0 steps per channel = 4,096 colors (True 16-bit Retro Era)
    const retroColorFilter = new PIXI.Filter(null, colorShader, { colorSteps: 16.0 });

    // Apply the filter to the entire 3D world!
    entityLayer.filters = [retroColorFilter];
    backgroundLayer.filters = [retroColorFilter];

    // --- 2. DYNAMIC GRID SYSTEM ---
    const gridGraphics = new PIXI.Graphics();
    backgroundLayer.addChild(gridGraphics);

    let TILE_W = 128, TILE_H = 64;
    function getOrigin() { return { x: app.screen.width / 2, y: app.screen.height * 0.35 }; }
    function toIso(cartX, cartY) {
        const origin = getOrigin();
        return { x: (cartX - cartY) * (TILE_W / 2) + origin.x, y: (cartX + cartY) * (TILE_H / 2) + origin.y };
    }
    function toCart(screenX, screenY) {
        const origin = getOrigin();
        let adjX = screenX - origin.x, adjY = screenY - origin.y;
        return { x: (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2, y: (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2 };
    }

    function drawGrid() {
        gridGraphics.clear();
        gridGraphics.lineStyle(2, 0x222226, 1); 
        const GRID_SIZE = 25; 
        
        for (let i = -15; i <= GRID_SIZE; i++) {
            let p1 = toIso(i, -15); let p2 = toIso(i, GRID_SIZE);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
            p1 = toIso(-15, i); p2 = toIso(GRID_SIZE, i);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
        }
    }

    // --- 3. RESIZE HANDLER ---
    function resizeApp() {
        drawGrid();

        // 🌟 DYNAMIC REPOSITIONING:
        if (entityLayer) {
            entityLayer.children.forEach(c => {
                if (c.gridX !== undefined && c.gridY !== undefined) {
                    const pos = toIso(c.gridX, c.gridY);
                    c.x = pos.x;
                    c.y = pos.y;
                }
            });
        }

        if (typeof customStartBtn !== 'undefined' && customStartBtn) {
            customStartBtn.x = 100; customStartBtn.y = app.screen.height - 120;
            customStopBtn.x = 220; customStopBtn.y = app.screen.height - 120;
            customToggleBtn.x = 340; customToggleBtn.y = app.screen.height - 120;
        }

        syncMonitors();
    }
    window.addEventListener('resize', resizeApp);

    // --- 4. ESCAPE KEY & MENU NAVIGATION ---
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            monitors.forEach(m => m.dock());
            return;
        }

        if (document.querySelector('.portal-menu')) {
            switch(e.key) {
                case '1': loadPortalPage('COMPANY INFO'); break;
                case '2': loadPortalPage('TALENT SOLUTIONS'); break;
                case '3': loadPortalPage('CONTACT'); break;
                case '4': loadPortalPage('CUSTOMER CARE'); break;
                case '5': loadPortalPage('BLOG'); break;
                case '6': startHackingGame(); break; 
            }
        } else if (document.querySelector('.portal-content') && e.key === 'Backspace') {
            showIntranetMenu();
        }
    }, true);

    // --- 5. FLOATING MONITOR SYSTEM ---
    const monitors = [];
    function createMonitorOverlay(id, label, offsetX, offsetY, localWidth, localHeight, contentHTML, baseTransform = 'none') {
        const div = document.createElement('div');
        div.className = 'monitor-overlay';
        div.id = id;

        div.innerHTML = `
            <div class="monitor-cover">${label}</div>
            <div class="hardware-bezel">
                <div class="monitor-header"><span>IBEX OS // ${label}</span></div>
                <div class="monitor-body">${contentHTML}</div>
            </div>
            <div class="hardware-controls">
                <div class="hw-logo">IBEX // ${label}</div>
                <div class="hw-vent"></div>
                <div class="hw-power-btn close-btn">SHUT DOWN</div>
            </div>
        `;
        document.getElementById('app-wrapper').appendChild(div);

        const closeBtn = div.querySelector('.close-btn');
        const cover = div.querySelector('.monitor-cover');
        
        const monitorData = {
            element: div, offsetX: offsetX, offsetY: offsetY,
            baseW: localWidth, baseH: localHeight,
            baseTransform: baseTransform, state: 'docked'
        };
        monitors.push(monitorData);

        const focusMe = () => {
            if (monitorData.state === 'centered' || monitorData.state === 'animating') return;
            if (div.classList.contains('power-off')) return;
            
            monitorData.state = 'animating';
            
            div.classList.add('is-booting');
            div.classList.add('is-centered'); 
            
            div.style.transition = 'none';
            div.style.top = '-100vh'; 
            div.style.zIndex = 200;
            cover.style.display = 'none';
            app.view.style.filter = 'blur(12px) brightness(0.3)';

            void div.offsetWidth; 
            
            div.style.transition = 'top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)'; 
            div.style.top = '5vh'; 

            setTimeout(() => {
                monitorData.state = 'centered';
                div.classList.remove('is-booting'); 
                
                const input = div.querySelector('input');
                if (input) input.focus();
                
                if(id === 'mon-security' && !document.getElementById('hack-container-id')) {
                    startHackingGame();
                }
                
                if(id === 'mon-terminal' && document.getElementById('robot-display').innerHTML.trim() === '') {
                    window.updateRobotDisplay();
                }
            }, 650); 
        };

        const dockMe = (e) => {
            if (e) e.stopPropagation();
            if (monitorData.state === 'docked' || monitorData.state === 'animating') return;
            monitorData.state = 'animating';
            
            div.classList.add('is-booting'); 
            
            div.style.transition = 'top 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045)'; 
            div.style.top = '-100vh';
            app.view.style.filter = 'none';

            setTimeout(() => {
                div.style.transition = 'none';
                div.classList.remove('is-centered'); 
                div.classList.remove('is-booting');
                cover.style.display = 'flex';
                div.style.zIndex = 50;
                div.style.transform = monitorData.baseTransform;
                
                monitorData.state = 'docked';
                syncMonitors(); 
                
                if (id === 'mon-terminal' && window.pendingDeployment) {
                    window.startAutomatedClawSwap(window.pendingDeployment.target, window.pendingDeployment.config);
                    window.pendingDeployment = null; 
                    document.getElementById('deploy-btn').classList.remove('disabled');
                    document.getElementById('fabrication-status').innerText = `STATUS: AWAITING SELECTION...`;
                }

            }, 500);
        };

        cover.addEventListener('click', focusMe);
        closeBtn.addEventListener('click', dockMe);
        monitorData.dock = dockMe;
        return div;
    }

    function syncMonitors() {
        const centerX = app.screen.width / 2;
        const centerY = app.screen.height / 2;
        const scale = Math.max(app.screen.width / 1920, 0.6); 

        monitors.forEach(m => {
            if (m.state === 'docked') {
                m.element.style.left = `${centerX + (m.offsetX * scale)}px`;
                m.element.style.top = `${centerY + (m.offsetY * scale)}px`;
                m.element.style.width = `${m.baseW * scale}px`;
                m.element.style.height = `${m.baseH * scale}px`;
                m.element.style.fontSize = `${12 * scale}px`;
                m.element.style.transform = m.baseTransform; 
            }
        });
    }

    createMonitorOverlay("mon-terminal", "FACTORY", -400, 200, 240, 180, `
        <div class="retro-wrapper"><div class="retro-title">ROBOT FABRICATION PROTOCOL v4.0</div>
            <div class="slider-controls">
                <div class="slider-btn" onclick="prevRobot()">&#9664;</div>
                <div class="robot-display" id="robot-display"></div>
                <div class="slider-btn" onclick="nextRobot()">&#9654;</div>
            </div>
            <div class="target-selection">
                <span>TARGET UNIT:</span>
                <div class="target-btn selected" id="tgt-0" onclick="selectTarget(0)">[ 1 ]</div>
                <div class="target-btn" id="tgt-1" onclick="selectTarget(1)">[ 2 ]</div>
            </div>
            <div style="margin-top: auto; border-top: 2px dashed #1cf843; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2; position: relative;">
                <div id="fabrication-status" style="font-size: 0.8em;">STATUS: AWAITING SELECTION...</div>
                <div class="deploy-btn" id="deploy-btn" onclick="queueFabrication()">INITIATE REPLACEMENT</div>
            </div>
        </div>
    `, 'perspective(800px) rotateY(20deg) skewY(-5deg)');

    createMonitorOverlay("mon-web", "WEBSITE", -100, 180, 320, 180, `
        <div class="retro-wrapper" style="padding: 0;"><iframe src="https://goibex.it" class="website-iframe"></iframe></div>
    `, 'none');

    createMonitorOverlay("mon-security", "SECURITY", 280, 220, 240, 180, `
        <div class="retro-wrapper">
            <div class="retro-title">RESTRICTED AREA // PASSWORD REQUIRED</div>
            <div id="security-content" style="flex-grow: 1; position: relative;"></div>
        </div>
    `, 'perspective(800px) rotateY(-20deg) skewY(8deg)');


    // --- 6. FABRICATION SLIDER UI LOGIC ---
    let currentRobotIndex = 0;
    let selectedTargetIndex = 0;

    window.updateRobotDisplay = function() {
        const robot = ROBOT_DATABASE[currentRobotIndex];
        document.getElementById('robot-display').innerHTML = `
            <div class="robot-large-thumb" style="background-image: url('${robot.thumb}')"></div>
            <div class="robot-large-name">${robot.name}</div>
        `;
    };
    window.prevRobot = function() { currentRobotIndex = (currentRobotIndex - 1 + ROBOT_DATABASE.length) % ROBOT_DATABASE.length; updateRobotDisplay(); };
    window.nextRobot = function() { currentRobotIndex = (currentRobotIndex + 1) % ROBOT_DATABASE.length; updateRobotDisplay(); };
    window.selectTarget = function(idx) {
        selectedTargetIndex = idx;
        document.querySelectorAll('.target-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('tgt-' + idx).classList.add('selected');
    };
    window.queueFabrication = function() {
        const selectedConfig = ROBOT_DATABASE[currentRobotIndex];
        const robotsOnBelt = entityLayer.children.filter(c => c.type === 'robot').sort((a, b) => a.x - b.x);
        
        if (robotsOnBelt.length <= selectedTargetIndex) {
            document.getElementById('fabrication-status').innerText = `ERROR: TARGET UNIT NOT FOUND.`;
            return;
        }

        const targetEntity = robotsOnBelt[selectedTargetIndex];
        document.getElementById('deploy-btn').classList.add('disabled');
        document.getElementById('fabrication-status').innerText = `STATUS: QUEUED. CLOSE TERMINAL TO DEPLOY.`;

        window.pendingDeployment = { target: targetEntity, config: selectedConfig };
    }


    // --- 7. PIXIJS HARDWARE BUTTONS ---
    let customStartBtn, customStopBtn, customToggleBtn;
    
    PIXI.Assets.load(['pixilart-sprite.png', 'stop_btn.png', 'toggle_btn.png']).then((textures) => {
        function createHardwareButton(textureName, actionCallback) {
            const texture = textures[textureName];
            const halfWidth = texture.width / 2;
            const fullHeight = texture.height;
            const normalTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(0, 0, halfWidth, fullHeight));
            const pressedTex = new PIXI.Texture(texture.baseTexture, new PIXI.Rectangle(halfWidth, 0, halfWidth, fullHeight));
            
            const btn = new PIXI.Sprite(normalTex);
            btn.scale.set(3);
            btn.interactive = true; btn.cursor = 'pointer';
            btn.hitArea = new PIXI.Rectangle(25, 35, halfWidth - 45, fullHeight - 80);

            let isPressed = false; const pressDepth = 4;
            btn.on('pointerdown', () => {
                if (!isPressed) { btn.texture = pressedTex; btn.y += (pressDepth * btn.scale.y); isPressed = true; }
            });
            const releaseButton = () => {
                if (isPressed) { btn.texture = normalTex; btn.y -= (pressDepth * btn.scale.y); isPressed = false; }
            };
            btn.on('pointerup', () => { releaseButton(); actionCallback(); });
            btn.on('pointerupoutside', releaseButton);
            
            uiLayer.addChild(btn);
            return btn;
        }

        customStartBtn = createHardwareButton('pixilart-sprite.png', () => {
            document.querySelectorAll('.monitor-overlay').forEach(el => el.classList.remove('power-off'));
            document.getElementById('coords-display').innerText = "SYSTEM: MONITORS ON";
            document.getElementById('coords-display').style.color = "#4CAF50";
        });

        customStopBtn = createHardwareButton('stop_btn.png', () => {
            monitors.forEach(m => m.dock());
            document.querySelectorAll('.monitor-overlay').forEach(el => el.classList.add('power-off'));
            document.getElementById('coords-display').innerText = "SYSTEM: MONITORS OFF";
            document.getElementById('coords-display').style.color = "#ff5252";
        });

        customToggleBtn = createHardwareButton('toggle_btn.png', () => {
            isAnimating = !isAnimating;
            entityLayer.children.forEach(e => { if (e.play) { if (isAnimating) e.play(); else e.stop(); } });
            document.getElementById('coords-display').innerText = `SYSTEM: ${isAnimating ? 'RESUMED' : 'PAUSED'}`;
            document.getElementById('coords-display').style.color = isAnimating ? "#4CAF50" : "#ffb74d";
        });
    });

    // --- 8. HACKING MINIGAME & PORTAL ---
    let hackAttempts = 4; const targetWord = "IBEX";
    const decoyWords = ["CODE", "DATA", "HIRE", "WORK", "JOBS", "TEAM", "TECH", "CORE", "SYNC", "PLAN", "ROOT", "BOOT", "USER", "FILE", "NODE", "PORT", "NULL"];
    const garbageChars = "!@#$%^&*()_+-=[]{}|;':,./<>?`~";

    function startHackingGame() {
        const container = document.getElementById('security-content');
        hackAttempts = 4;
        let shuffledDecoys = decoyWords.sort(() => 0.5 - Math.random()).slice(0, 14);
        let allWords = [...shuffledDecoys, targetWord].sort(() => 0.5 - Math.random());
        
        let html = `<div class="hack-container" id="hack-container-id"><div class="hack-main"><div class="hack-column" id="hack-col-1"></div><div class="hack-column" id="hack-col-2"></div></div><div class="hack-log-panel"><div class="hack-attempts">ATTEMPTS: <span id="hack-attempt-count">4</span> <span id="hack-blocks">■ ■ ■ ■</span></div><div class="hack-output" id="hack-output-log">> INITIATING LOGIN...<br>> ENTER PASSWORD.<br></div><div class="hack-hover-display" id="hack-hover-display">> <span class="cursor-block">█</span></div></div></div>`;
        container.innerHTML = html;

        const col1 = document.getElementById('hack-col-1'); const col2 = document.getElementById('hack-col-2');
        let wordIndex = 0;
        for(let i=0; i<40; i++) {
            const hex = "0x" + Math.floor(Math.random()*65535).toString(16).toUpperCase().padStart(4, '0');
            let rowStr = ""; for(let j=0; j<14; j++) rowStr += garbageChars.charAt(Math.floor(Math.random() * garbageChars.length));

            if (wordIndex < allWords.length && Math.random() > 0.4) {
                const word = allWords[wordIndex]; const insertPos = Math.floor(Math.random() * (14 - word.length));
                const pre = rowStr.substring(0, insertPos).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const post = rowStr.substring(insertPos + word.length).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                rowStr = `${pre}<span class="hack-word" onmouseenter="document.getElementById('hack-hover-display').innerHTML = '> ${word} <span class=\\'cursor-block\\'>█</span>'" onmouseleave="document.getElementById('hack-hover-display').innerHTML = '> <span class=\\'cursor-block\\'>█</span>'" onclick="handleHackAttempt('${word}')">${word}</span>${post}`;
                wordIndex++;
            } else { rowStr = rowStr.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
            let delay = (i < 20 ? i : i - 20) * 0.03;
            const rowHtml = `<div class="hack-row" style="animation-delay: ${delay}s"><span class="hack-hex">${hex}</span> <span>${rowStr}</span></div>`;
            if(i < 20) col1.innerHTML += rowHtml; else col2.innerHTML += rowHtml;
        }
    }

    window.handleHackAttempt = function(word) {
        if(hackAttempts <= 0) return;
        const log = document.getElementById('hack-output-log');
        log.innerHTML += `> ${word}<br>`;

        if(word === targetWord) {
            log.innerHTML += `<span style="color:#fff; text-shadow: 0 0 10px #fff;">> EXACT MATCH!</span><br>> ACCESS GRANTED.<br>`;
            setTimeout(() => { showIntranetMenu(); }, 1200); return;
        }
        let likeness = 0; for(let i=0; i<4; i++) { if(word[i] === targetWord[i]) likeness++; }
        
        hackAttempts--; log.innerHTML += `> ENTRY DENIED.<br>> LIKENESS=${likeness}<br>`;
        document.getElementById('hack-attempt-count').innerText = hackAttempts;
        document.getElementById('hack-blocks').innerText = "■ ".repeat(hackAttempts);

        if(hackAttempts <= 0) {
            log.innerHTML += `<span style="color:red; text-shadow: 0 0 10px red;">> TERMINAL LOCKED.</span><br>> REBOOTING...<br>`;
            setTimeout(() => { startHackingGame(); }, 2000); 
        }
        log.scrollTop = log.scrollHeight;
    };

    function showIntranetMenu() {
        document.getElementById('security-content').innerHTML = `
            <div class="portal-menu">
                <div style="margin-bottom: 20px; border-bottom: 1px dashed #1cf843; padding-bottom: 10px;">WELCOME TO THE IBEX SECURE INTRANET.<br>PLEASE SELECT A MODULE OR USE KEYBOARD (1-6):</div>
                <div class="portal-item" onclick="loadPortalPage('COMPANY INFO')">[1] COMPANY INFO</div>
                <div class="portal-item" onclick="loadPortalPage('TALENT SOLUTIONS')">[2] TALENT SOLUTIONS</div>
                <div class="portal-item" onclick="loadPortalPage('CONTACT')">[3] CONTACT</div>
                <div class="portal-item" style="margin-top:20px; color:#aaa;" onclick="startHackingGame()">[6] LOGOUT</div>
            </div>`;
    }

    const portalData = {
        'COMPANY INFO': { text: "IBEX Staffing Solutions.<br><br>Founded on the principle that the right talent unlocks exponential growth.", art: `       /\\\n      // \\\n     //   \\\n    //IBEX \\\n   //_______\\\n  /          \\` },
        'TALENT SOLUTIONS': { text: "Whether you need temporary contractors for immediate project scaling or long-term executive placements, IBEX delivers.", art: `    _____     _____\n   /     \\   /     \\\n  |  ___  |_|  ___  |\n  | |   |__ __|   | |\n  |_|      V      |_|\n   Handshake Protocol\n      Engaged.` },
        'CONTACT': { text: "REACH THE IBEX HUB:<br><br>Direct Line: 555-IBEX-HIRE<br>Encrypted Mail: secure@goibex.it", art: `   _________________\n  / \\             / \\\n |   \\           /   |\n |    \\_________/    |\n |      S E C U R E  |\n  \\_________________/` }
    };

    window.loadPortalPage = function(pageId) {
        const data = portalData[pageId];
        document.getElementById('security-content').innerHTML = `
            <div class="portal-content">
                <div style="border-bottom: 1px dashed #1cf843; padding-bottom: 10px;">MODULE :: ${pageId}</div>
                <div class="portal-body"><div class="portal-text">${data.text}</div><div class="portal-art">${data.art}</div></div>
                <div class="portal-back" onclick="showIntranetMenu()">[ < RETURN TO MENU (BACKSPACE) ]</div>
            </div>`;
    };


    // --- 9. ASSET PRE-LOADING & UNIVERSAL DRAGGABLE SYSTEM ---
    const swPaths = [ 'animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_001.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_002.png', 'animations/Breathing_Idle-c1b5dcec/south-west/frame_003.png' ];
    
    let allAssetsToLoad = [...swPaths, 'hook-remove.png', 'ibex-banner.png', 'pillars.png'];
    ROBOT_DATABASE.forEach(robot => { allAssetsToLoad = allAssetsToLoad.concat(robot.paths); });

    PIXI.Assets.load(allAssetsToLoad).then((textures) => {
        const hookTex = textures['hook-remove.png'];
        const frameW = hookTex.width / 4; const frameH = hookTex.height / 2;
        const openClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(0, 0, frameW, frameH));
        const closedClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(frameW, 0, frameW, frameH));

        const chain = new PIXI.Graphics();
        entityLayer.addChild(chain);

        const claw = new PIXI.Sprite(openClawTex);
        claw.anchor.set(0.6, 1.2); claw.scale.set(1.5); claw.visible = false;
        claw.mode = 'idle'; claw.targetY = 0;
        entityLayer.addChild(claw);

        // 🌟 THE NEW UNIVERSAL DRAG-AND-DROP BUILDER FUNCTION 🌟
        function createDraggable(textureData, gridX, gridY, type, scale = 1, grabOffset = 30) {
            let entity;
            
            // Checks if we passed an array (animations) or a single string (structures)
            if (Array.isArray(textureData)) {
                entity = new PIXI.AnimatedSprite(textureData.map(p => textures[p]));
                entity.animationSpeed = 0.1; 
                if (typeof isAnimating !== 'undefined' && isAnimating) entity.play();
            } else {
                entity = new PIXI.Sprite(textures[textureData]);
            }
            
            entity.anchor.set(0.5, 1); 
            entity.scale.set(scale);

            // Save properties for the physics & claw system
            entity.initialGridX = gridX; 
            entity.initialGridY = gridY; 
            entity.gridX = gridX; 
            entity.gridY = gridY; 
            entity.type = type;
            entity.grabOffset = grabOffset; 

            const pos = toIso(gridX, gridY);
            entity.x = pos.x; 
            entity.y = pos.y; 
            entity.zIndex = entity.y;
            
            entityLayer.addChild(entity);

            entity.interactive = true; 
            entity.cursor = 'grab';
            let dragging = false, dragOffset = { x: 0, y: 0 };

            entity.on('pointerdown', (e) => {
                // Prevent overlapping grabs if claw is already busy
                if(claw.mode !== 'idle' && claw.visible) return; 
                
                dragging = true; entity.isDragging = true;
                entity.cursor = 'grabbing'; entity.alpha = 0.8; 
                
                dragOffset.x = entity.x - e.data.global.x; 
                dragOffset.y = entity.y - e.data.global.y;
                
                // ONLY deploy the claw if it's a worker or robot!
                if (entity.type === 'human' || entity.type === 'robot') {
                    claw.texture = openClawTex; claw.visible = true;
                    claw.x = entity.x; claw.y = -300; 
                    claw.targetY = entity.y - entity.grabOffset; 
                    claw.mode = 'manual_dropping';
                }
            });

            const endDrag = () => {
                if(!dragging) return;
                dragging = false; entity.isDragging = false;
                entity.cursor = 'grab'; entity.alpha = 1;
                
                // ONLY retract the claw if it was actually deployed
                if (entity.type === 'human' || entity.type === 'robot') {
                    claw.texture = openClawTex; claw.mode = 'manual_retracting'; claw.targetY = -300;
                }
            };

            entity.on('pointerup', endDrag);
            entity.on('pointerupoutside', endDrag);

            entity.on('globalpointermove', (e) => {
                if (dragging) {
                    let rawX = e.data.global.x + dragOffset.x;
                    let rawY = e.data.global.y + dragOffset.y;
                    
                    entity.x = rawX; 
                    entity.y = rawY;
                    
                    // ONLY update claw position if it belongs to a worker/robot
                    if (entity.type === 'human' || entity.type === 'robot') {
                        claw.x = entity.x;
                        if (claw.mode === 'manual_dropping') claw.targetY = entity.y - entity.grabOffset;
                        else claw.y = entity.y - entity.grabOffset; 
                    }

                    const cart = toCart(rawX, rawY);
                    entity.gridX = cart.x; entity.gridY = cart.y;
                    document.getElementById('coords-display').innerText = `X: ${cart.x.toFixed(1)} | Y: ${cart.y.toFixed(1)}`;
                }
            }); 
            return entity;
        }

        const baseRobotConfig = ROBOT_DATABASE.find(r => r.id === 'robot_base');
        
        // -------------------------------------------------------------
        // ⚙️ SPAWN EVERYTHING INTO THE SANDBOX HERE:
        // Format: createDraggable(texture, Grid X, Grid Y, type, scale, grabOffset);
        // -------------------------------------------------------------
        
        // Structures (Claw ignores these!)
        createDraggable('ibex-banner.png', 2.7, 9.9, 'structure', 0.7, 100);
        createDraggable('pillars.png', 9.9, 2.6, 'structure', 0.7, 130);

        // Workers & Robots (Claw grabs these!)
        createDraggable(baseRobotConfig.paths, 0, 0, 'robot', 3, 30);
        createDraggable(baseRobotConfig.paths, 2, 2, 'robot', 3, 30);
        createDraggable(swPaths, -2, 2, 'human', 3, 30);


        window.startAutomatedClawSwap = function(targetEntity, newConfig) {
            claw.autoTarget = targetEntity; claw.newRobotConfig = newConfig;
            claw.texture = openClawTex; claw.visible = true;
            claw.x = targetEntity.x; claw.y = -300; 
            claw.targetY = targetEntity.y - targetEntity.grabOffset; 
            claw.mode = 'auto_fetch';
        }

        // --- 10. GLOBAL TICKER FOR Y-SORTING ---
        app.ticker.add(() => {
            entityLayer.children.forEach(c => { c.zIndex = c.y; });

            if (claw.visible && claw.mode !== 'idle') {
                claw.zIndex = claw.targetY; 
                chain.zIndex = claw.targetY;

                if (claw.mode === 'manual_dropping') {
                    claw.y += (claw.targetY - claw.y) * 0.4;
                    if (Math.abs(claw.targetY - claw.y) < 5) { claw.y = claw.targetY; claw.mode = 'manual_holding'; claw.texture = closedClawTex; }
                } else if (claw.mode === 'manual_retracting') {
                    claw.y += (claw.targetY - claw.y) * 0.2;
                    if (claw.y < -100) { claw.mode = 'idle'; claw.visible = false; chain.clear(); }
                } else if (claw.mode === 'auto_fetch') {
                    claw.y += (claw.targetY - claw.y) * 0.3;
                    if (Math.abs(claw.targetY - claw.y) < 5) { claw.y = claw.targetY; claw.texture = closedClawTex; claw.autoTarget.visible = false; claw.mode = 'auto_retract_old'; claw.targetY = -300; }
                } else if (claw.mode === 'auto_retract_old') {
                    claw.y += (claw.targetY - claw.y) * 0.15; 
                    if (claw.y < -100) {
                        const newTextures = claw.newRobotConfig.paths.map(p => textures[p]);
                        claw.autoTarget.textures = newTextures; claw.autoTarget.play(); 
                        claw.mode = 'auto_drop_new'; claw.targetY = claw.autoTarget.y - claw.autoTarget.grabOffset; 
                    }
                } else if (claw.mode === 'auto_drop_new') {
                    claw.y += (claw.targetY - claw.y) * 0.3;
                    if (Math.abs(claw.targetY - claw.y) < 5) { claw.y = claw.targetY; claw.autoTarget.visible = true; claw.texture = openClawTex; claw.mode = 'auto_retract_final'; claw.targetY = -300; }
                } else if (claw.mode === 'auto_retract_final') {
                    claw.y += (claw.targetY - claw.y) * 0.2;
                    if (claw.y < -100) { claw.mode = 'idle'; claw.visible = false; chain.clear(); }
                }

                if (claw.visible) {
                    chain.clear(); const chainX = claw.x - 12; 
                    for (let cy = -300; cy < claw.y - 280; cy += 14) {
                        chain.beginFill(0xaaaaaa); chain.drawRect(chainX - 3, cy, 6, 10);
                        chain.beginFill(0x1a1a1a); chain.drawRect(chainX - 1, cy + 2, 2, 6); chain.endFill();
                        chain.beginFill(0x333333); chain.drawRect(chainX - 5, cy + 8, 10, 4);
                        chain.beginFill(0x777777); chain.drawRect(chainX - 5, cy + 8, 10, 2); chain.endFill();
                    }
                }
            }
        });
        
        resizeApp();
    });
</script>
