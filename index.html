<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBEX Staffing Solutions - Factory Sandbox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* --- 1. GLOBAL & UI STYLES --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0a0a0c; 
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app-wrapper {
            width: 100vw; height: 100vh; overflow: hidden;
            position: relative; transform-origin: center center;
        }

        /* Demolish Mode Cursor Override */
        body.demolish-mode canvas {
            cursor: crosshair !important;
        }

        /* --- CRT / PHOSPHOR MASK OVERLAY --- */
        #app-wrapper::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 8000; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.08), rgba(0, 255, 0, 0.04), rgba(0, 0, 255, 0.08));
            background-size: 100% 4px, 6px 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);
        }
        
        canvas { image-rendering: pixelated; } 

        
        #ui-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(11, 12, 16, 0.85); padding: 15px 25px;
            border-radius: 8px; font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.2);
            pointer-events: none; z-index: 8010;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #81C784; margin-bottom: 6px; }
        .panel-data { font-size: 22px; font-weight: bold; color: #4CAF50; font-family: 'Courier New', Courier, monospace; }

        /* --- EASTER EGG OVERLAY --- */
        #easter-egg-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(15, 0, 0, 0.95); z-index: 9000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .warning-text {
            color: #ff1111; font-family: 'Courier New', Courier, monospace;
            font-size: 3.5vw; text-align: center; font-weight: bold;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            animation: warning-blink 1.2s steps(2, start) infinite;
        }
        @keyframes warning-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* --- 2. THE NEW CONTROL DESK --- */
        #control-desk {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 80px; background: #1a1a17;
            border-top: 4px solid #3a3a35;
            display: flex; align-items: center; justify-content: center; gap: 40px;
            z-index: 9000; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
            font-family: 'Courier New', Courier, monospace;
        }

        .desk-group {
            display: flex; gap: 15px; align-items: center; background: #0f0f0d; padding: 10px 20px;
            border-radius: 8px; border: 2px solid #2a2a26; box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .desk-label { color: #8a8a83; font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-right: 10px; }

        .desk-btn {
            background: #c4c4bc; color: #111; 
            border: 3px solid; border-color: #e8e8e3 #8a8a83 #8a8a83 #e8e8e3;
            padding: 8px 16px; font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-family: 'Courier New', Courier, monospace;
            transition: all 0.1s; outline: none;
        }
        .desk-btn:active {
            border-color: #8a8a83 #e8e8e3 #e8e8e3 #8a8a83; 
            transform: translate(2px, 2px); box-shadow: 0px 0px 2px rgba(0,0,0,0.5);
        }
        .desk-btn.btn-red { background: #a00; color: #fff; border-color: #f55 #400 #400 #f55; }
        .desk-btn.btn-red:active { border-color: #400 #f55 #f55 #400; }
        
        .desk-btn.btn-warning { background: #ffb74d; color: #000; border-color: #ffe0b2 #f57c00 #f57c00 #ffe0b2; }
        .desk-btn.btn-warning.active { background: #f57c00; border-color: #e65100 #ffe0b2 #ffe0b2 #e65100; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: translateY(2px); color: #fff; }

        /* --- 3. HEAVY INDUSTRIAL MONITOR CSS --- */
        .monitor-overlay {
            position: absolute; background: #c4c4bc; 
            border: 6px solid; border-color: #e8e8e3 #8a8a83 #8a8a83 #e8e8e3; 
            border-radius: 12px; padding: 12px; box-sizing: border-box; overflow: hidden;
            pointer-events: auto; z-index: 8005; 
            display: flex; flex-direction: column;
            box-shadow: 15px 25px 40px rgba(0, 0, 0, 0.9);
            top: -150vh; left: 50%; transform: translateX(-50%);
            width: 80vw; max-width: 1400px; height: 80vh; max-height: 900px;
            transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .monitor-overlay.is-centered { top: 5vh; z-index: 8005; }

        .hardware-bezel {
            flex-grow: 1; display: flex; flex-direction: column; background: #000000; 
            border: 8px solid; border-color: #050505 #333 #333 #050505;
            border-radius: 8px; padding: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }
        
        /* NEW: MOBILE-FRIENDLY CLOSE BUTTON */
        .close-x-btn {
            position: absolute; top: 12px; right: 15px; z-index: 100;
            color: #d32f2f; font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold;
            background: #050505; border: 2px solid #333; padding: 2px 8px; border-radius: 4px;
            cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,1);
            display: none; /* Hide when docked */
        }
        .monitor-overlay.is-centered .close-x-btn { display: block; }
        .close-x-btn:hover { background: #330000; border-color: #d32f2f; color: #ff3333; text-shadow: 0 0 5px #ff3333; }

        .monitor-body { 
            flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border-radius: 4px; box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .hardware-controls {
            height: 3rem; display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 5px 0 5px; margin-top: 5px; border-top: 2px solid #8a8a83;
        }

        .hw-logo { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2rem; color: #5a5a53; text-shadow: 1px 1px 0px #fff; letter-spacing: 2px; }
        
        .led-indicator {
            width: 12px; height: 12px; border-radius: 50%; background: #ff3333; border: 2px solid #5a5a53;
            box-shadow: 0 0 10px #ff3333, inset 2px 2px 2px rgba(255,255,255,0.4); animation: led-blink 1.5s infinite;
        }
        @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- 4. RETRO UI STYLES --- */
        .retro-wrapper {
            background-color: #000000; color: #1cf843; font-family: 'Courier New', Courier, monospace; font-weight: bold;
            /*text-shadow: 0 0 6px rgba(28, 248, 67, 0.8); height: 100%; width: 100%; position: relative;*/
            padding: 2vh 3vw; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; 
            font-size: clamp(12px, 1.8vh, 22px); line-height: 1.3;
        }

        /*
        .retro-wrapper::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none; box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }
        */

        .retro-title { margin-bottom: 2vh; border-bottom: 2px solid #1cf843; padding-bottom: 10px; font-size: 1.2em; text-transform: uppercase; flex-shrink: 0; padding-right: 40px; /* Space for the X button */ }
        .website-iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #fff; z-index: 2; position: relative; }

        /* --- NEW GRID BUILDER UI (TIGHTER COLUMNS FOR MOBILE) --- */
        .build-grid {
            display: grid;
            /* Shrunk minmax from 140px to 90px so they pack much tighter together! */
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            padding: 10px 0;
            overflow-y: auto;
            flex-grow: 1;
            z-index: 2; position: relative;
        }
        
        .build-grid::-webkit-scrollbar { width: 8px; }
        .build-grid::-webkit-scrollbar-track { background: rgba(28, 248, 67, 0.1); border: 1px solid #1cf843; }
        .build-grid::-webkit-scrollbar-thumb { background: #1cf843; }

        .build-item {
            border: 2px dashed #1cf843;
            background: rgba(28, 248, 67, 0.05);
            padding: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
        }
        .build-item:hover { background: rgba(28, 248, 67, 0.2); transform: scale(1.02); }
        .build-item.selected {
            background: rgba(28, 248, 67, 0.4);
            border-style: solid;
            box-shadow: inset 0 0 20px rgba(28, 248, 67, 0.8), 0 0 15px rgba(28, 248, 67, 0.5);
            color: #fff;
        }
        
        .build-item-thumb {
            width: 8vh; height: 8vh; min-width: 40px; min-height: 40px;
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            image-rendering: pixelated; margin-bottom: 5px;
        }
        .build-item-name { font-size: 0.7em; text-align: center; letter-spacing: 1px; }

        .deploy-btn { border: 2px solid #1cf843; padding: 10px 20px; cursor: pointer; transition: all 0.2s; font-size: 1em; text-align: center; width: max-content; background: rgba(28, 248, 67, 0.1); }
        .deploy-btn:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 15px #1cf843; }
        .deploy-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* --- MINIGAME / MENU STYLES --- */
        .hack-container { display: flex; gap: 2em; letter-spacing: 2px; height: 100%; z-index: 2; position: relative; overflow: hidden; }
        .hack-main { flex-grow: 1; display: flex; gap: 1.5em; overflow-y: hidden; }
        .hack-column { display: flex; flex-direction: column; width: 50%; }
        @keyframes row-appear { 0% { opacity: 0; transform: translateX(-5px); } 100% { opacity: 1; transform: translateX(0); } }
        .hack-row { display: flex; gap: 1em; margin-bottom: 1px; opacity: 0; animation: row-appear 0.15s ease forwards; }
        .hack-hex { opacity: 0.6; }
        .hack-word { cursor: pointer; transition: background 0.1s, color 0.1s; position: relative; display: inline-block;}
        .hack-word:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 8px #1cf843; }
        
        .hack-log-panel { width: 18em; min-width: 250px; border-left: 2px dashed rgba(28, 248, 67, 0.5); padding-left: 1.5em; display: flex; flex-direction: column; }
        .hack-attempts { margin-bottom: 1em; }
        .hack-output { flex-grow: 1; overflow-y: auto; font-size: 0.9em; line-height: 1.5; word-wrap: break-word; }
        .hack-hover-display { margin-top: auto; border-top: 1px solid #1cf843; padding-top: 0.8em; min-height: 1.5em; font-weight: bold; }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor-block { display: inline-block; animation: blink-cursor 1s infinite; }
        
        .portal-menu { z-index: 2; position: relative; display: flex; flex-direction: column; gap: 0.8em; font-size: 1.1em; }
        .portal-item { cursor: pointer; padding: 0.3em; display: inline-block; transition: all 0.2s; width: max-content;}
        .portal-item:hover { background: #1cf843; color: #040c04; text-shadow: none; }
        .portal-content { z-index: 2; position: relative; display: flex; gap: 2em; height: 100%; flex-direction: column;}
        .portal-body { display: flex; gap: 2em; }
        .portal-text { flex: 1; font-size: 1.1em; line-height: 1.6; }
        .portal-art { flex: 1; white-space: pre; font-size: 0.8em; line-height: 1.2em; color: #1cf843; }
        .portal-back { margin-top: auto; cursor: pointer; width: max-content; padding: 0.5em; border: 1px solid #1cf843; }
        .portal-back:hover { background: #1cf843; color: #040c04; text-shadow: none; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="ui-panel">
        <div class="panel-title">Active Entity Position</div>
        <div class="panel-data" id="coords-display">X: -- | Y: --</div>
    </div>

    <div id="control-desk">
        <div class="desk-group">
            <div class="desk-label">MODULES</div>
            <button class="desk-btn" onclick="toggleMonitor('mon-terminal')">FACTORY</button>
            <button class="desk-btn" onclick="toggleMonitor('mon-web')">WEBSITE</button>
            <button class="desk-btn" onclick="toggleMonitor('mon-security')">SECURITY</button>
        </div>
        
        <div class="desk-group">
            <div class="desk-label">SYSTEM</div>
            <button class="desk-btn btn-warning" id="btn-demolish" onclick="toggleDemolishMode()">DEMOLISH: OFF</button>
        </div>
    </div>

    <div id="easter-egg-overlay">
        <div class="warning-text">
            ROBOTS HAVE ASSUMED CONTROL.<br><br>SHUTTING THE SYSTEMS DOWN<br>AND REBOOTING...
        </div>
    </div>
</div>

<script>
    // ============================================================================
    // ⚙️ MASTER BUILD CATALOG
    // ============================================================================
    const BUILD_CATALOG = [
        {
            id: 'robot_base', name: 'WORKER UNIT', type: 'robot', scale: 3, grabOffset: 30,
            hasRotation: true, folder: 'robot', 
            animatedDirs: ['south', 'south-east'], // <--- 2 animations
            animBase: 'robot/animations/Breathing_Idle-c693fd1f',
            thumb: 'robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png'
        },
        {
            id: 'robot_v1', name: 'SECURITY UNIT', type: 'robot', scale: 3, grabOffset: 30,
            hasRotation: true, folder: 'robot1', 
            animatedDirs: ['south-east'], // <--- 1 animation
            animBase: 'robot1/animations/Breathing_Idle-6d37f6f3',
            thumb: 'robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_000.png'
        },
        {
            id: 'human_worker', name: 'HUMAN OPERATOR', type: 'human', scale: 3, grabOffset: 30,
            hasRotation: true, folder: 'human', 
            animatedDirs: ['north-east', 'south', 'south-west'], // <--- 3 animations
            animBase: 'human/animations/Breathing_Idle-c1b5dcec',
            thumb: 'human/animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png'
        },
        {
            id: 'banner', name: 'IBEX BANNER', type: 'structure', scale: 0.7, grabOffset: 450,
            hasRotation: false, thumb: 'static_assets/ibex-banner.png', textureData: 'static_assets/ibex-banner.png'
        },
        {
            id: 'pillar', name: 'SUPPORT PILLAR', type: 'structure', scale: 0.7, grabOffset: 280,
            hasRotation: false, thumb: 'static_assets/pillars.png', textureData: 'static_assets/pillars.png'
        }
    ];


    let isAnimating = true;
    let demolishMode = false;

    // --- 1. PIXI INITIALIZATION & LAYERS ---
    PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
    
    // YOUR EXACT CHUNKY ENGINE RESOLUTION
    const app = new PIXI.Application({ 
        resizeTo: window, 
        backgroundColor: 0x0a0a0c,
        resolution: 0.35,  
        autoDensity: true 
    });
    
    document.getElementById('app-wrapper').appendChild(app.view);

    const backgroundLayer = new PIXI.Container();
    const entityLayer = new PIXI.Container();
    entityLayer.sortableChildren = true; 

    app.stage.addChild(backgroundLayer);
    app.stage.addChild(entityLayer);

    // --- 🌟 YOUR CUSTOM 16-BIT COLOR SHADER 🌟 ---
    const colorShader = `
        varying vec2 vTextureCoord;
        uniform sampler2D uSampler;
        uniform float colorSteps;
        void main(void) {
            vec4 color = texture2D(uSampler, vTextureCoord);
            color.r = floor(color.r * colorSteps) / colorSteps;
            color.g = floor(color.g * colorSteps) / colorSteps;
            color.b = floor(color.b * colorSteps) / colorSteps;
            gl_FragColor = color;
        }
    `;

    const retroColorFilter = new PIXI.Filter(null, colorShader, { colorSteps: 16.0 });
    entityLayer.filters = [retroColorFilter];
    backgroundLayer.filters = [retroColorFilter];

    // --- 2. DYNAMIC GRID SYSTEM ---
    const gridGraphics = new PIXI.Graphics();
    backgroundLayer.addChild(gridGraphics);

    let TILE_W = 128, TILE_H = 64;
    function getOrigin() { return { x: app.screen.width / 2, y: app.screen.height * 0.35 }; }
    function toIso(cartX, cartY) { return { x: (cartX - cartY) * (TILE_W / 2) + getOrigin().x, y: (cartX + cartY) * (TILE_H / 2) + getOrigin().y }; }
    function toCart(screenX, screenY) {
        let adjX = screenX - getOrigin().x, adjY = screenY - getOrigin().y;
        return { x: (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2, y: (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2 };
    }

    function drawGrid() {
        gridGraphics.clear();
        gridGraphics.lineStyle(2, 0x222226, 1); 
        const GRID_SIZE = 25; 
        for (let i = -15; i <= GRID_SIZE; i++) {
            let p1 = toIso(i, -15); let p2 = toIso(i, GRID_SIZE);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
            p1 = toIso(-15, i); p2 = toIso(GRID_SIZE, i);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
        }
    }

    // --- 3. RESIZE HANDLER ---
    function resizeApp() {
        drawGrid();
        if (entityLayer) {
            entityLayer.children.forEach(c => {
                if (c.gridX !== undefined && c.gridY !== undefined) {
                    const pos = toIso(c.gridX, c.gridY);
                    c.x = pos.x; c.y = pos.y;
                }
            });
        }
    }
    window.addEventListener('resize', resizeApp);

    // --- 4. X-RAY VISION & ESC KEY LOGIC ---
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Shift') {
            entityLayer.children.forEach(c => {
                if (c.type === 'structure') { c.interactive = false; c.alpha = 0.4; }
            });
        }

        if (e.key === 'Escape') {
            window.closeAllMonitors();
            return;
        }

        if (document.querySelector('.portal-menu')) {
            switch(e.key) {
                case '1': loadPortalPage('COMPANY INFO'); break;
                case '2': loadPortalPage('TALENT SOLUTIONS'); break;
                case '3': loadPortalPage('CONTACT'); break;
                case '4': loadPortalPage('CUSTOMER CARE'); break;
                case '5': loadPortalPage('BLOG'); break;
                case '6': startHackingGame(); break; 
            }
        } else if (document.querySelector('.portal-content') && e.key === 'Backspace') {
            showIntranetMenu();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'Shift') {
            entityLayer.children.forEach(c => {
                if (c.type === 'structure') { c.interactive = true; c.alpha = 1.0; }
            });
        }
    });

    // --- 5. BRUTALIST MONITOR SYSTEM ---
    const monitors = [];
    function createMonitor(id, label, contentHTML) {
        const div = document.createElement('div');
        div.className = 'monitor-overlay';
        div.id = id;

        div.innerHTML = `
            <div class="hardware-bezel">
                <div class="close-x-btn" onclick="closeAllMonitors()">[X]</div>
                <div class="monitor-body">${contentHTML}</div>
            </div>
            <div class="hardware-controls">
                <div class="hw-logo">IBEX // ${label}</div>
                <div class="led-indicator"></div>
                <button class="desk-btn btn-red" onclick="closeAllMonitors()">PWR</button>
            </div>
        `;
        document.getElementById('app-wrapper').appendChild(div);
        monitors.push({ id: id, element: div });
    }

   createMonitor("mon-terminal", "FACTORY", `
        <div class="retro-wrapper"><div class="retro-title">FABRICATION & DEPLOYMENT</div>
            <div class="build-grid" id="build-grid-container"></div>
            
            <div id="rotation-container" style="display: none; justify-content: space-between; align-items: center; border-top: 2px dashed #1cf843; padding-top: 10px; margin-top: auto; font-size: 0.8em;">
                <span>ORIENTATION:</span>
                <select id="rotation-select" style="background: #040c04; color: #1cf843; border: 1px solid #1cf843; font-family: 'Courier New', monospace; font-weight: bold; padding: 4px; outline: none; cursor: pointer;">
                    <option value="south-east">SOUTH-EAST</option>
                    <option value="south">SOUTH</option>
                    <option value="south-west">SOUTH-WEST</option>
                    <option value="west">WEST</option>
                    <option value="north-west">NORTH-WEST</option>
                    <option value="north">NORTH</option>
                    <option value="north-east">NORTH-EAST</option>
                    <option value="east">EAST</option>
                </select>
            </div>

            <div style="border-top: 2px dashed #1cf843; padding-top: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 2; position: relative;">
                <div id="fabrication-status" style="font-size: 0.8em;">STATUS: SELECT AN ASSET</div>
                <div class="deploy-btn disabled" id="deploy-btn" onclick="deployItem()">DEPLOY TO FLOOR</div>
            </div>
        </div>
    `);

createMonitor("mon-web", "WEBSITE", `<iframe src="https://goibex.it" style="width: 100%; height: 100%; flex-grow: 1; border: none; display: block; background: #fff;"></iframe>`);
    createMonitor("mon-security", "SECURITY", `
        <div class="retro-wrapper">
            <div class="retro-title">RESTRICTED AREA // PASSWORD REQUIRED</div>
            <div id="security-content" style="flex-grow: 1; position: relative;"></div>
        </div>
    `);

    // UI BUTTON LOGIC
    window.toggleMonitor = function(targetId) {
        monitors.forEach(m => m.element.classList.remove('is-centered'));
        const target = document.getElementById(targetId);
        target.classList.add('is-centered');

        if(targetId === 'mon-security' && !document.getElementById('hack-container-id')) startHackingGame();
        
        if(targetId === 'mon-terminal' && document.getElementById('build-grid-container').innerHTML.trim() === '') {
            window.populateBuildGrid();
        }
    };

    window.closeAllMonitors = function() {
        monitors.forEach(m => m.element.classList.remove('is-centered'));
    };

    // --- DEMOLISH MODE LOGIC ---
    window.toggleDemolishMode = function() {
        demolishMode = !demolishMode;
        const btn = document.getElementById('btn-demolish');
        if (demolishMode) {
            btn.classList.add('active');
            btn.innerText = "DEMOLISH: ON";
            document.body.classList.add('demolish-mode');
            document.getElementById('coords-display').innerText = `SYSTEM: DEMOLISH MODE ACTIVE`;
            document.getElementById('coords-display').style.color = "#ff5252";
        } else {
            btn.classList.remove('active');
            btn.innerText = "DEMOLISH: OFF";
            document.body.classList.remove('demolish-mode');
            document.getElementById('coords-display').innerText = `SYSTEM: READY`;
            document.getElementById('coords-display').style.color = "#4CAF50";
        }
    }

    // --- 6. SANDBOX GRID BUILDER LOGIC ---
    let currentBuildIndex = -1;

    window.populateBuildGrid = function() {
        const container = document.getElementById('build-grid-container');
        container.innerHTML = BUILD_CATALOG.map((item, index) => `
            <div class="build-item" id="build-item-${index}" onclick="selectBuildItem(${index})">
                <div class="build-item-thumb" style="background-image: url('${item.thumb}')"></div>
                <div class="build-item-name">${item.name}</div>
            </div>
        `).join('');
    };

    window.selectBuildItem = function(index) {
        currentBuildIndex = index;
        document.querySelectorAll('.build-item').forEach(el => el.classList.remove('selected'));
        document.getElementById(`build-item-${index}`).classList.add('selected');
        
        // Show or hide the rotation dropdown based on the item type!
        const item = BUILD_CATALOG[index];
        document.getElementById('rotation-container').style.display = item.hasRotation ? 'flex' : 'none';
        
        document.getElementById('fabrication-status').innerText = `STATUS: READY TO DEPLOY`;
        document.getElementById('deploy-btn').classList.remove('disabled');
    };
    
   window.deployItem = function() {
        if(currentBuildIndex === -1) return;
        const item = BUILD_CATALOG[currentBuildIndex];
        
        let textureToSpawn = item.textureData; 
        
        if (item.hasRotation) {
            const rot = document.getElementById('rotation-select').value;
            
            // Check if the picked direction has an animation
            if (item.animatedDirs.includes(rot)) {
                // Yes? Spawn the breathing ANIMATION array!
                textureToSpawn = [
                    `${item.animBase}/${rot}/frame_000.png`,
                    `${item.animBase}/${rot}/frame_001.png`,
                    `${item.animBase}/${rot}/frame_002.png`,
                    `${item.animBase}/${rot}/frame_003.png`
                ];
            } else {
                // No animation for this direction? Spawn the STATIC image!
                textureToSpawn = `${item.folder}/rotations/${rot}.png`;
            }
        }
        
        document.getElementById('fabrication-status').innerText = `STATUS: DEPLOYED SECURELY.`;
        document.getElementById('deploy-btn').classList.add('disabled');
        
        window.createDraggable(textureToSpawn, 0, 0, item.type, item.scale, item.grabOffset);

        setTimeout(() => { window.closeAllMonitors(); }, 800);
    }

    // --- 7. HACKING MINIGAME & PORTAL ---
    let hackAttempts = 4; const targetWord = "IBEX";
    const decoyWords = ["CODE", "DATA", "HIRE", "WORK", "JOBS", "TEAM", "TECH", "CORE", "SYNC", "PLAN", "ROOT", "BOOT", "USER", "FILE", "NODE", "PORT", "NULL"];
    const garbageChars = "!@#$%^&*()_+-=[]{}|;':,./<>?`~";

    function startHackingGame() {
        const container = document.getElementById('security-content');
        hackAttempts = 4;
        let shuffledDecoys = decoyWords.sort(() => 0.5 - Math.random()).slice(0, 14);
        let allWords = [...shuffledDecoys, targetWord].sort(() => 0.5 - Math.random());
        
        let html = `<div class="hack-container" id="hack-container-id"><div class="hack-main"><div class="hack-column" id="hack-col-1"></div><div class="hack-column" id="hack-col-2"></div></div><div class="hack-log-panel"><div class="hack-attempts">ATTEMPTS: <span id="hack-attempt-count">4</span> <span id="hack-blocks">■ ■ ■ ■</span></div><div class="hack-output" id="hack-output-log">> INITIATING LOGIN...<br>> ENTER PASSWORD.<br></div><div class="hack-hover-display" id="hack-hover-display">> <span class="cursor-block">█</span></div></div></div>`;
        container.innerHTML = html;

        const col1 = document.getElementById('hack-col-1'); const col2 = document.getElementById('hack-col-2');
        let wordIndex = 0;
        for(let i=0; i<40; i++) {
            const hex = "0x" + Math.floor(Math.random()*65535).toString(16).toUpperCase().padStart(4, '0');
            let rowStr = ""; for(let j=0; j<14; j++) rowStr += garbageChars.charAt(Math.floor(Math.random() * garbageChars.length));

            if (wordIndex < allWords.length && Math.random() > 0.4) {
                const word = allWords[wordIndex]; const insertPos = Math.floor(Math.random() * (14 - word.length));
                const pre = rowStr.substring(0, insertPos).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const post = rowStr.substring(insertPos + word.length).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                rowStr = `${pre}<span class="hack-word" onmouseenter="document.getElementById('hack-hover-display').innerHTML = '> ${word} <span class=\\'cursor-block\\'>█</span>'" onmouseleave="document.getElementById('hack-hover-display').innerHTML = '> <span class=\\'cursor-block\\'>█</span>'" onclick="handleHackAttempt('${word}')">${word}</span>${post}`;
                wordIndex++;
            } else { rowStr = rowStr.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
            let delay = (i < 20 ? i : i - 20) * 0.03;
            const rowHtml = `<div class="hack-row" style="animation-delay: ${delay}s"><span class="hack-hex">${hex}</span> <span>${rowStr}</span></div>`;
            if(i < 20) col1.innerHTML += rowHtml; else col2.innerHTML += rowHtml;
        }
    }

    window.handleHackAttempt = function(word) {
        if(hackAttempts <= 0) return;
        const log = document.getElementById('hack-output-log');
        log.innerHTML += `> ${word}<br>`;

        if(word === targetWord) {
            log.innerHTML += `<span style="color:#fff; text-shadow: 0 0 10px #fff;">> EXACT MATCH!</span><br>> ACCESS GRANTED.<br>`;
            setTimeout(() => { showIntranetMenu(); }, 1200); return;
        }
        let likeness = 0; for(let i=0; i<4; i++) { if(word[i] === targetWord[i]) likeness++; }
        
        hackAttempts--; log.innerHTML += `> ENTRY DENIED.<br>> LIKENESS=${likeness}<br>`;
        document.getElementById('hack-attempt-count').innerText = hackAttempts;
        document.getElementById('hack-blocks').innerText = "■ ".repeat(hackAttempts);

        if(hackAttempts <= 0) {
            log.innerHTML += `<span style="color:red; text-shadow: 0 0 10px red;">> TERMINAL LOCKED.</span><br>> REBOOTING...<br>`;
            setTimeout(() => { startHackingGame(); }, 2000); 
        }
        log.scrollTop = log.scrollHeight;
    };

    function showIntranetMenu() {
        document.getElementById('security-content').innerHTML = `
            <div class="portal-menu">
                <div style="margin-bottom: 20px; border-bottom: 1px dashed #1cf843; padding-bottom: 10px;">WELCOME TO THE IBEX SECURE INTRANET.<br>PLEASE SELECT A MODULE OR USE KEYBOARD (1-6):</div>
                <div class="portal-item" onclick="loadPortalPage('COMPANY INFO')">[1] COMPANY INFO</div>
                <div class="portal-item" onclick="loadPortalPage('TALENT SOLUTIONS')">[2] TALENT SOLUTIONS</div>
                <div class="portal-item" onclick="loadPortalPage('CONTACT')">[3] CONTACT</div>
                <div class="portal-item" style="margin-top:20px; color:#aaa;" onclick="startHackingGame()">[6] LOGOUT</div>
            </div>`;
    }

    const portalData = {
        'COMPANY INFO': { text: "IBEX Staffing Solutions.<br><br>Founded on the principle that the right talent unlocks exponential growth.", art: `       /\\\n      // \\\n     //   \\\n    //IBEX \\\n   //_______\\\n  /          \\` },
        'TALENT SOLUTIONS': { text: "Whether you need temporary contractors for immediate project scaling or long-term executive placements, IBEX delivers.", art: `    _____     _____\n   /     \\   /     \\\n  |  ___  |_|  ___  |\n  | |   |__ __|   | |\n  |_|      V      |_|\n   Handshake Protocol\n      Engaged.` },
        'CONTACT': { text: "REACH THE IBEX HUB:<br><br>Direct Line: 555-IBEX-HIRE<br>Encrypted Mail: secure@goibex.it", art: `   _________________\n  / \\             / \\\n |   \\           /   |\n |    \\_________/    |\n |      S E C U R E  |\n  \\_________________/` }
    };

    window.loadPortalPage = function(pageId) {
        const data = portalData[pageId];
        document.getElementById('security-content').innerHTML = `
            <div class="portal-content">
                <div style="border-bottom: 1px dashed #1cf843; padding-bottom: 10px;">MODULE :: ${pageId}</div>
                <div class="portal-body"><div class="portal-text">${data.text}</div><div class="portal-art">${data.art}</div></div>
                <div class="portal-back" onclick="showIntranetMenu()">[ < RETURN TO MENU (BACKSPACE) ]</div>
            </div>`;
    };

    // --- 8. ASSET PRE-LOADING & UNIVERSAL DRAGGABLE SYSTEM ---
    const directions = ['east', 'north-east', 'north-west', 'north', 'south-east', 'south-west', 'south', 'west'];
    let allAssetsToLoad = ['static_assets/hook-remove.png', 'static_assets/ibex-banner.png'];

    BUILD_CATALOG.forEach(item => {
        if (item.hasRotation) {
            // 1. Load ALL 8 static images from the rotations folder
            directions.forEach(dir => allAssetsToLoad.push(`${item.folder}/rotations/${dir}.png`));
            
            // 2. Load the 4 animated frames ONLY for the directions that actually exist!
            item.animatedDirs.forEach(animDir => {
                for(let i=0; i<=3; i++) {
                    allAssetsToLoad.push(`${item.animBase}/${animDir}/frame_00${i}.png`);
                }
            });
        } else {
            allAssetsToLoad.push(item.textureData);
        }
    });
    allAssetsToLoad = [...new Set(allAssetsToLoad)];


    PIXI.Assets.load(allAssetsToLoad).then((textures) => {
        const hookTex = textures['static_assets/hook-remove.png'];
        const frameW = hookTex.width / 4; const frameH = hookTex.height / 2;
        const openClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(0, 0, frameW, frameH));
        const closedClawTex = new PIXI.Texture(hookTex.baseTexture, new PIXI.Rectangle(frameW, 0, frameW, frameH));

        const chain = new PIXI.Graphics();
        entityLayer.addChild(chain);

        const claw = new PIXI.Sprite(openClawTex);
        claw.anchor.set(0.6, 1.2); claw.scale.set(1.5); claw.visible = false;
        claw.mode = 'idle'; claw.targetY = 0; claw.baseY = 0;
        entityLayer.addChild(claw);

        // 🌟 EXPOSED GLOBALLY FOR UI DEPLOYMENT 🌟
        window.createDraggable = function(textureData, gridX, gridY, type, scale = 1, grabOffset = 30, isUndeletable = false) {
            let entity;
            let tex; 
            
            if (Array.isArray(textureData)) {
                tex = textures[textureData[0]];
                entity = new PIXI.AnimatedSprite(textureData.map(p => textures[p]));
                entity.animationSpeed = 0.1; 
                if (typeof isAnimating !== 'undefined' && isAnimating) entity.play();
            } else {
                tex = textures[textureData];
                entity = new PIXI.Sprite(tex);
            }
            
            entity.anchor.set(0.5, 1); 
            entity.scale.set(scale);

            if (type === 'human' || type === 'robot') {
                entity.hitArea = new PIXI.Rectangle(-tex.width * 0.2, -tex.height * 0.9, tex.width * 0.4, tex.height * 0.9);
            } else {
                entity.hitArea = new PIXI.Rectangle(-tex.width / 2, -tex.height, tex.width, tex.height);
            }

            entity.initialGridX = gridX; entity.initialGridY = gridY; 
            entity.gridX = gridX; entity.gridY = gridY; 
            entity.type = type; entity.grabOffset = grabOffset; 

            const pos = toIso(gridX, gridY);
            entity.x = pos.x; entity.y = pos.y; entity.zIndex = entity.y;
            
            entityLayer.addChild(entity);

            entity.interactive = true; entity.cursor = 'grab';
            let dragging = false, dragOffset = { x: 0, y: 0 };

            entity.on('pointerdown', (e) => {
                // 🔥 DEMOLISH OVERRIDE 🔥
                if (demolishMode) {
                    if (isUndeletable) return;


                    if (entity.isDemolishing) return; // Prevent double-clicking
                    entity.isDemolishing = true;
                    entity.interactive = false; // Stop it from being clicked again
                    
                    // The Classic Arcade Blink Effect
                    let blinkTimer = 0;
                    const blinkAnim = () => {
                        blinkTimer++;
                        
                        // Toggle visibility every 4 frames to create the flashing effect
                        if (blinkTimer % 4 === 0) {
                            entity.alpha = entity.alpha === 1 ? 0 : 1;
                        }
                        
                        // After 24 frames (a quick flash), delete it entirely
                        if (blinkTimer > 24) {
                            app.ticker.remove(blinkAnim);
                            entity.destroy();
                        }
                    };
                    
                    // Attach the animation to the engine
                    app.ticker.add(blinkAnim);
                    return;
                }

                if(claw.mode !== 'idle' && claw.visible) return; 
                
                dragging = true; entity.isDragging = true;
                entity.cursor = 'grabbing'; entity.alpha = 0.8; 
                
                dragOffset.x = entity.x - e.data.global.x; 
                dragOffset.y = entity.y - e.data.global.y;
                
                claw.texture = openClawTex; claw.visible = true;
                claw.x = entity.x; claw.y = -300; 
                claw.targetY = entity.y - entity.grabOffset; 
                claw.baseY = entity.y; 
                claw.mode = 'manual_dropping';
            });

            const endDrag = () => {
                if(!dragging) return;
                dragging = false; entity.isDragging = false;
                entity.cursor = 'grab'; entity.alpha = 1;
                claw.texture = openClawTex; claw.mode = 'manual_retracting'; claw.targetY = -300;
            };

            entity.on('pointerup', endDrag);
            entity.on('pointerupoutside', endDrag);

            entity.on('globalpointermove', (e) => {
                if (dragging && !demolishMode) {
                    let rawX = e.data.global.x + dragOffset.x;
                    let rawY = e.data.global.y + dragOffset.y;
                    
                    entity.x = rawX; entity.y = rawY;
                    claw.x = entity.x;
                    
                    if (claw.mode === 'manual_dropping') claw.targetY = entity.y - entity.grabOffset;
                    else claw.y = entity.y - entity.grabOffset; 
                    
                    claw.baseY = entity.y; 

                    const cart = toCart(rawX, rawY);
                    entity.gridX = cart.x; entity.gridY = cart.y;
                    document.getElementById('coords-display').innerText = `X: ${cart.x.toFixed(1)} | Y: ${cart.y.toFixed(1)}`;
                }
            }); 
            
            return entity;
        } 
        
        // --- INITIAL SCENE SETUP ---
        const bannerItem = BUILD_CATALOG.find(i => i.id === 'banner');
        const pillarItem = BUILD_CATALOG.find(i => i.id === 'pillar');
        const robotBaseItem = BUILD_CATALOG.find(i => i.id === 'robot_base');
        const humanWorkerItem = BUILD_CATALOG.find(i => i.id === 'human_worker');
        
        // Pass the specific direction we know works!
        const getAnimFrames = (item, dir) => [
            `${item.animBase}/${dir}/frame_000.png`,
            `${item.animBase}/${dir}/frame_001.png`,
            `${item.animBase}/${dir}/frame_002.png`,
            `${item.animBase}/${dir}/frame_003.png`
        ];

        window.createDraggable(bannerItem.textureData, -2.2, 10.4, bannerItem.type, bannerItem.scale, bannerItem.grabOffset, true); 
        window.createDraggable(pillarItem.textureData, 10.4, 4.7, pillarItem.type, pillarItem.scale, pillarItem.grabOffset);

        // Spawn using directions we explicitly declared as animated
        window.createDraggable(getAnimFrames(robotBaseItem, 'south-east'), 0, 0, robotBaseItem.type, robotBaseItem.scale, robotBaseItem.grabOffset);
        window.createDraggable(getAnimFrames(robotBaseItem, 'south'), 2, 2, robotBaseItem.type, robotBaseItem.scale, robotBaseItem.grabOffset);
        window.createDraggable(getAnimFrames(humanWorkerItem, 'south-west'), -2, 2, humanWorkerItem.type, humanWorkerItem.scale, humanWorkerItem.grabOffset);

        // --- 10. GLOBAL TICKER FOR Y-SORTING & CLAW PHYSICS ---
        app.ticker.add(() => {
            entityLayer.children.forEach(c => { c.zIndex = c.y; });

            if (claw.visible && claw.mode !== 'idle') {
                claw.zIndex = claw.baseY + 1; 
                chain.zIndex = claw.baseY + 1;

                if (claw.mode === 'manual_dropping') {
                    claw.y += (claw.targetY - claw.y) * 0.6;
                    if (Math.abs(claw.targetY - claw.y) < 5) { claw.y = claw.targetY; claw.mode = 'manual_holding'; claw.texture = closedClawTex; }
                } else if (claw.mode === 'manual_retracting') {
                    claw.y += (claw.targetY - claw.y) * 0.3;
                    if (claw.y < -100) { claw.mode = 'idle'; claw.visible = false; chain.clear(); }
                }

                if (claw.visible) {
                    chain.clear(); const chainX = claw.x - 12; 
                    for (let cy = -300; cy < claw.y - 280; cy += 14) {
                        chain.beginFill(0xaaaaaa); chain.drawRect(chainX - 3, cy, 6, 10);
                        chain.beginFill(0x1a1a1a); chain.drawRect(chainX - 1, cy + 2, 2, 6); chain.endFill();
                        chain.beginFill(0x333333); chain.drawRect(chainX - 5, cy + 8, 10, 4);
                        chain.beginFill(0x777777); chain.drawRect(chainX - 5, cy + 8, 10, 2); chain.endFill();
                    }
                }
            }
        });
        
        resizeApp();
    });
</script>
