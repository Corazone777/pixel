<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IBEX Staffing Solutions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <style>
        /* --- 1. GLOBAL & UI STYLES --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0a0a0c; 
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }

        #app-wrapper {
            width: 100vw; height: 100vh; overflow: hidden;
            position: relative; transform-origin: center center;
        }

        body.demolish-mode canvas { cursor: crosshair !important; }

        /* --- CRT / PHOSPHOR MASK OVERLAY --- */
        #app-wrapper::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 8000; pointer-events: none;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.08), rgba(0, 255, 0, 0.04), rgba(0, 0, 255, 0.08));
            background-size: 100% 4px, 6px 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(0,0,0,0.8);
        }
        
        canvas { 
            image-rendering: pixelated; 
            touch-action: none; 
        } 

        #ui-panel {
            position: absolute; top: 20px; right: 20px;
            background: rgba(11, 12, 16, 0.85); padding: 15px 25px;
            border-radius: 8px; font-size: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(76, 175, 80, 0.2);
            pointer-events: none; z-index: 8010;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #81C784; margin-bottom: 6px; }
        .panel-data { font-size: 22px; font-weight: bold; color: #4CAF50; font-family: 'Courier New', Courier, monospace; }

        #easter-egg-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(15, 0, 0, 0.95); z-index: 9000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .warning-text {
            color: #ff1111; font-family: 'Courier New', Courier, monospace;
            font-size: 3.5vw; text-align: center; font-weight: bold;
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            animation: warning-blink 1.2s steps(2, start) infinite;
        }
        @keyframes warning-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

     /* --- 2. THE NEW CONTROL DESK --- */
        #control-desk {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 80px; background: #1a1a17;
            border-top: 4px solid #3a3a35;
            display: flex; align-items: center; justify-content: center; gap: 40px;
            z-index: 9000; box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
            font-family: 'Courier New', Courier, monospace;
            padding: 0 30px; /* Added padding to keep the plaque off the exact edge */
        }

        /* PLAQUE STYLING */
        #desk-logo-plaque {
            position: absolute; 
            
            left: 30px; 
            height: 100px;
            
            top: -10px;
            
            user-select: none;
            
            max-width: 300px;
        }
        .desk-group {
            display: flex; gap: 15px; align-items: center; background: #0f0f0d; padding: 10px 20px;
            border-radius: 8px; border: 2px solid #2a2a26; box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .desk-label { color: #8a8a83; font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-right: 10px; }

        .desk-btn {
            background: #c4c4bc; color: #111; 
            border: 3px solid; border-color: #e8e8e3 #8a8a83 #8a8a83 #e8e8e3;
            padding: 8px 16px; font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-family: 'Courier New', Courier, monospace;
            transition: all 0.1s; outline: none;
            white-space: nowrap;
        }
        .desk-btn:active {
            border-color: #8a8a83 #e8e8e3 #e8e8e3 #8a8a83; 
            transform: translate(2px, 2px); box-shadow: 0px 0px 2px rgba(0,0,0,0.5);
        }
        .desk-btn.btn-red { background: #a00; color: #fff; border-color: #f55 #400 #400 #f55; }
        .desk-btn.btn-red:active { border-color: #400 #f55 #f55 #400; }
        
        .desk-btn.btn-red.active { 
            background: #800; 
            border-color: #400 #f55 #f55 #400; 
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); 
            transform: translateY(2px); 
        }

        .desk-btn.btn-warning { background: #ffb74d; color: #000; border-color: #ffe0b2 #f57c00 #f57c00 #ffe0b2; }
        .desk-btn.btn-warning.active { background: #f57c00; border-color: #e65100 #ffe0b2 #ffe0b2 #e65100; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); transform: translateY(2px); color: #fff; }

        /* --- 3. HEAVY INDUSTRIAL MONITOR CSS --- */
        .monitor-overlay {
            position: absolute; background: #c4c4bc; 
            border: 6px solid; border-color: #e8e8e3 #8a8a83 #8a8a83 #e8e8e3; 
            border-radius: 12px; padding: 12px; box-sizing: border-box; overflow: hidden;
            pointer-events: auto; z-index: 8005; 
            display: flex; flex-direction: column;
            box-shadow: 15px 25px 40px rgba(0, 0, 0, 0.9);
            top: -150vh; left: 50%; transform: translateX(-50%);
            width: 80vw; max-width: 1400px; height: 80vh; max-height: 900px;
            transition: top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .monitor-overlay.is-centered { top: 5vh; z-index: 8005; }

        .hardware-bezel {
            flex-grow: 1; display: flex; flex-direction: column; background: #000000; 
            border: 8px solid; border-color: #050505 #333 #333 #050505;
            border-radius: 8px; padding: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,1);
            position: relative;
        }
        
        .close-x-btn {
            position: absolute; top: 12px; right: 15px; z-index: 100;
            color: #35e25c; font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold;
            background: #050505; border: 2px solid #333; padding: 2px 8px; border-radius: 4px;
            cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,1);
            display: none; 
        }
        .monitor-overlay.is-centered .close-x-btn { display: block; }
        .close-x-btn:hover { background: #330000; border-color: #d32f2f; color: #ff3333; text-shadow: 0 0 5px #ff3333; }

        .monitor-body { 
            flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border-radius: 4px; box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .hardware-controls {
            height: 3rem; display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 5px 0 5px; margin-top: 5px; border-top: 2px solid #8a8a83;
        }

        .hw-logo { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1.2rem; color: #5a5a53; text-shadow: 1px 1px 0px #fff; letter-spacing: 2px; }
        
        .led-indicator {
            width: 12px; height: 12px; border-radius: 50%; background: #ff3333; border: 2px solid #5a5a53;
            box-shadow: 0 0 10px #ff3333, inset 2px 2px 2px rgba(255,255,255,0.4); animation: led-blink 1.5s infinite;
        }
        @keyframes led-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- 4. RETRO UI STYLES --- */
        .retro-wrapper {
            background-color: #000000; color: #1cf843; font-family: 'Courier New', Courier, monospace; font-weight: bold;
            padding: 2vh 3vw; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; 
            font-size: clamp(12px, 1.8vh, 22px); line-height: 1.3;
            position: relative;
        }

        /* CRT SCANLINE OVERLAY */
        .retro-wrapper::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none; z-index: 9999;
        }

        @keyframes monitor-flicker {
            0% { opacity: 1; } 94% { opacity: 1; } 95% { opacity: 0.85; }
            96% { opacity: 1; } 98% { opacity: 0.95; } 100% { opacity: 1; }
        }
        .monitor-body { animation: monitor-flicker 5s infinite; }

        .retro-title { margin-bottom: 2vh; border-bottom: 2px solid #1cf843; padding-bottom: 10px; font-size: 1.2em; text-transform: uppercase; flex-shrink: 0; padding-right: 40px; }
        .website-iframe { flex-grow: 1; border: none; width: 100%; height: 100%; background: #fff; z-index: 2; position: relative; }

        /* --- NEW GRID BUILDER UI --- */
       .build-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; padding: 15px; 
            overflow-y: auto; overflow-x: hidden; 
            flex-grow: 1; z-index: 2; position: relative;
        }
        
        .build-grid::-webkit-scrollbar { width: 8px; }
        .build-grid::-webkit-scrollbar-track { background: rgba(28, 248, 67, 0.1); border: 1px solid #1cf843; }
        .build-grid::-webkit-scrollbar-thumb { background: #1cf843; }

        .build-item {
            border: 2px dashed #1cf843; background: rgba(28, 248, 67, 0.05);
            padding: 15px 10px; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .build-item:hover { background: rgba(28, 248, 67, 0.2); transform: scale(1.02); }
        .build-item.selected {
            background: rgba(28, 248, 67, 0.4); border-style: solid;
            box-shadow: inset 0 0 20px rgba(28, 248, 67, 0.8), 0 0 15px rgba(28, 248, 67, 0.5);
            color: #fff;
        }
        
        .build-item-thumb {
            width: 10vh; height: 10vh; min-width: 60px; min-height: 60px;
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            image-rendering: pixelated; margin-bottom: 10px;
        }
        .build-item-name { font-size: 0.8em; text-align: center; letter-spacing: 1px; line-height: 1.2; }

        .deploy-btn { border: 2px solid #1cf843; padding: 10px 20px; cursor: pointer; transition: all 0.2s; font-size: 1em; text-align: center; width: max-content; background: rgba(28, 248, 67, 0.1); }
        .deploy-btn:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 15px #1cf843; }
        .deploy-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* --- MINIGAME / MENU STYLES --- */
        .hack-container { display: flex; gap: 2em; letter-spacing: 2px; height: 100%; z-index: 2; position: relative; overflow: hidden; }
        .hack-main { flex-grow: 1; display: flex; gap: 1.5em; overflow-y: hidden; }
        .hack-column { display: flex; flex-direction: column; width: 50%; }
        @keyframes row-appear { 0% { opacity: 0; transform: translateX(-5px); } 100% { opacity: 1; transform: translateX(0); } }
        .hack-row { display: flex; gap: 1em; margin-bottom: 1px; opacity: 0; animation: row-appear 0.15s ease forwards; }
        .hack-hex { opacity: 0.6; }
        .hack-word { cursor: pointer; transition: background 0.1s, color 0.1s; position: relative; display: inline-block;}
        .hack-word:hover { background: #1cf843; color: #040c04; text-shadow: none; box-shadow: 0 0 8px #1cf843; }
        
        .hack-log-panel { width: 18em; min-width: 250px; border-left: 2px dashed rgba(28, 248, 67, 0.5); padding-left: 1.5em; display: flex; flex-direction: column; }
        .hack-attempts { margin-bottom: 1em; }
        .hack-output { flex-grow: 1; overflow-y: auto; font-size: 0.9em; line-height: 1.5; word-wrap: break-word; }
        .hack-hover-display { margin-top: auto; border-top: 1px solid #1cf843; padding-top: 0.8em; min-height: 1.5em; font-weight: bold; }

        @keyframes blink-cursor { 0%, 49.9% { color: #1cf843; } 50%, 100% { color: transparent; } }
        .cursor-block { display: inline-block; -webkit-text-stroke: 1px #1cf843; animation: blink-cursor 1s infinite; }
        
        .portal-menu { z-index: 2; position: relative; display: flex; flex-direction: column; gap: 0.8em; font-size: 1.1em; }
        .portal-item { cursor: pointer; padding: 0.3em; display: inline-block; transition: all 0.2s; width: max-content;}
        .portal-item:hover { background: #1cf843; color: #040c04; text-shadow: none; }
        .portal-content { z-index: 2; position: relative; display: flex; gap: 2em; height: 100%; flex-direction: column;}
        .portal-body { display: flex; gap: 2em; }
        .portal-text { flex: 1; font-size: 1.1em; line-height: 1.6; }
        .portal-art { flex: 1; white-space: pre; font-size: 0.8em; line-height: 1.2em; color: #1cf843; }
        .portal-back { margin-top: auto; cursor: pointer; width: max-content; padding: 0.5em; border: 1px solid #1cf843; }
        .portal-back:hover { background: #1cf843; color: #040c04; text-shadow: none; }

        @keyframes correct-row-blink {
            0%, 100% { background: transparent; opacity: 1; }
            50% { background: rgba(28, 248, 67, 0.4); box-shadow: inset 0 0 15px #1cf843; opacity: 1; }
        }
        .hint-blink-row { opacity: 1 !important; animation: correct-row-blink 0.3s 3 forwards !important; }

        
        /* 🔥 RANDOM GENERATOR BUTTON */
        #btn-generate {
            position: absolute;
            bottom: 25px;
            right: 25px; /* Bottom right corner */
            background: #552b75;
            color: white;
            border: 2px solid #000;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            z-index: 9000;
            transition: transform 0.1s;
        }
        #btn-generate:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }


        /* =========================================
           📱 MOBILE RESPONSIVE DESIGN
           ========================================= */
        @media (max-width: 768px) {
            #ui-panel { top: 10px; right: 10px; padding: 10px 15px; }
            .panel-title { font-size: 9px; } .panel-data { font-size: 16px; }
            #control-desk { height: auto; padding: 8px 5px; flex-wrap: wrap; gap: 5px; }
            .desk-group { flex: 1; min-width: 130px; padding: 5px; gap: 5px; justify-content: center; }
            .desk-label { display: none; }
            .desk-btn { font-size: 11px; padding: 8px; flex-grow: 1; text-align: center; }
            .monitor-overlay { width: 95vw; height: 85vh; padding: 8px; }
            .monitor-overlay.is-centered { top: 2vh; }
            .hardware-bezel { padding: 4px; border-width: 4px; }
            .hardware-controls { height: auto; padding-bottom: 5px; }
            .hw-logo { font-size: 1rem; }
            .retro-title { font-size: 1em; padding-right: 30px; }
            .build-grid { grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); }
            #rotation-container { flex-direction: column; align-items: flex-start !important; gap: 8px; }
            #rotation-select { width: 100%; font-size: 14px; padding: 8px; }
            .deploy-btn { width: 100%; font-size: 1.1em; padding: 15px 0; margin-top: 10px; }
            #fabrication-status { margin-bottom: 10px; font-size: 0.9em; text-align: center; width: 100%; }
            .fab-footer-flex { flex-direction: column; align-items: center; }
            .hack-container { flex-direction: column; }
            .hack-main { flex-direction: column; overflow-y: auto; max-height: 40vh; }
            .hack-column { width: 100%; }
            #hack-col-2 { display: none; } 
            .hack-row { font-size: 0.85em; }
            .hack-log-panel { width: 100%; border-left: none; border-top: 2px dashed rgba(28, 248, 67, 0.5); padding-left: 0; padding-top: 10px; min-height: 120px; }
            .portal-body { flex-direction: column; gap: 1em; }
            .portal-art { font-size: 0.7em; text-align: center; }
            .portal-back { width: 100%; text-align: center; margin-top: 15px; }

            #desk-logo-plaque {
                position: relative; 
                left: 0;
                top: 0; /* Make sure we reset the desktop 'top' value! */
                height: 65px; /* ⬅️ INCREASED: Almost fills the desk height on mobile */
                margin: 0 auto 5px auto; 
                width: auto;
            }
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="ui-panel">
        <div class="panel-title">Active Entity Position</div>
        <div class="panel-data" id="coords-display">X: -- | Y: --</div>
    </div>

    <div id="control-desk">
        <img src="static_assets/ibex_logo_pixel_new.png" id="desk-logo-plaque" alt="IBEX Staffing">

        <div class="desk-group">
            <div class="desk-label">MODULES</div>
            <button class="desk-btn" onclick="toggleMonitor('mon-terminal')">FACTORY</button>
            <button class="desk-btn" onclick="toggleMonitor('mon-web')">WEBSITE</button>
            <button class="desk-btn" onclick="toggleMonitor('mon-security')">SECURITY</button>
        </div>
        
        <div class="desk-group">
            <div class="desk-label">SYSTEM</div>
            <button class="desk-btn btn-red" id="btn-demolish" onclick="toggleDemolishMode()">DEMOLISH: OFF</button>        
        </div>
    </div>

    <div id="easter-egg-overlay">
        <div class="warning-text">ROBOTS HAVE ASSUMED CONTROL.<br><br>SHUTTING THE SYSTEMS DOWN<br>AND REBOOTING...</div>
    </div>

    <button id="btn-generate" onclick="generateRandomFactory()">RNG FACTORY</button>
</div>

<script>
    // ============================================================================
    // ⚙️ MASTER BUILD CATALOG - NOW WITH PHYSICAL HEIGHTS FOR STACKING!
    // ============================================================================
    const BUILD_CATALOG = [
        {
            id: 'robot_base', name: 'WORKER UNIT', type: 'robot', scale: 3, grabOffset: 30, physicalHeight: 60,
            hasRotation: true, folder: 'humanoid/robot', animatedDirs: ['south', 'south-east'],
            animBase: 'humanoid/robot/animations/Breathing_Idle-c693fd1f',
            thumb: 'humanoid/robot/animations/Breathing_Idle-c693fd1f/south-east/frame_000.png',
            hitbox: { x: -0.2, y: -0.9, w: 0.4, h: 0.9 }
        },
        {
            id: 'robot_v1', name: 'SECURITY UNIT', type: 'robot', scale: 3, grabOffset: 30, physicalHeight: 60,
            hasRotation: true, folder: 'humanoid/robot1', animatedDirs: ['south-east'], 
            animBase: 'humanoid/robot1/animations/Breathing_Idle-6d37f6f3',
            thumb: 'humanoid/robot1/animations/Breathing_Idle-6d37f6f3/south-east/frame_000.png',
            hitbox: { x: -0.2, y: -0.9, w: 0.4, h: 0.9 }
        },
        {
            id: 'human_worker', name: 'HUMAN OPERATOR', type: 'human', scale: 3, grabOffset: 30, physicalHeight: 60,
            hasRotation: true, folder: 'humanoid/human', animatedDirs: ['north-east', 'south', 'south-west'],
            animBase: 'humanoid/human/animations/Breathing_Idle-c1b5dcec',
            thumb: 'humanoid/human/animations/Breathing_Idle-c1b5dcec/south-west/frame_000.png',
            hitbox: { x: -0.2, y: -0.9, w: 0.4, h: 0.9 }
        },
        {
            id: 'banner', name: 'IBEX BANNER', type: 'structure', scale: 1.1, grabOffset: 450, physicalHeight: 0,
            hasRotation: false, thumb: 'static_assets/new_ibex_banner.png', textureData: 'static_assets/new_ibex_banner.png',
            hitbox: { x: -0.5, y: -1, w: 1, h: 1 }
        },
        {
            id: 'conveyor_belt', name: 'CONVEYOR BELT', type: 'structure', scale: 0.3, grabOffset: 120, physicalHeight: 195,
            hasRotation: false, thumb: 'static_assets/conveyor-belt.png', textureData: 'static_assets/conveyor-belt.png',
            hitbox: [
                {x: -0.44, y: -0.71}, {x: -0.17, y: -0.93}, {x: 0.40,  y: -0.46}, {x: 0.17,  y: -0.14}  
            ]
        },
        {
            id: 'robotic-arm', name: 'ROBOTIC ARM', type: 'structure', scale: 1, grabOffset: 180, physicalHeight: 120,
            hasRotation: false, thumb: 'static_assets/robotic.png', textureData: 'static_assets/robotic.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        },
        {
            id: 'server-rack', name: 'SERVER RACK', type: 'structure', scale: 0.5, grabOffset: 180, physicalHeight: 100,
            hasRotation: false, thumb: 'static_assets/server.png', textureData: 'static_assets/server.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        },
        {
            id: 'computer', name: 'COMPUTER DESK', type: 'structure', scale: 0.5, grabOffset: 80, physicalHeight: 40,
            hasRotation: false, thumb: 'static_assets/computer_station.png', textureData: 'static_assets/computer_station.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        },
        {
            id: 'computer-on-wheels', name: 'COMPUTER ON WHEELS', type: 'structure', scale: 0.4, grabOffset: 80, physicalHeight: 45,
            hasRotation: false, thumb: 'static_assets/computer_wheels.png', textureData: 'static_assets/computer_wheels.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        },
        {
            id: 'wall-left', name: 'WALL LEFT', type: 'structure', scale: 1, grabOffset: 80, physicalHeight: 120,
            hasRotation: false, thumb: 'static_assets/wall_left.png', textureData: 'static_assets/wall_left.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        },
        {
            id: 'wall-right', name: 'WALL RIGHT', type: 'structure', scale: 1, grabOffset: 80, physicalHeight: 120,
            hasRotation: false, thumb: 'static_assets/wall_right.png', textureData: 'static_assets/wall_right.png',
            hitbox: { x: -0.5, y: -1, w: 0.9, h: 1 }
        }
    ];

    let isAnimating = true;
    let demolishMode = false;

    // --- 1. PIXI INITIALIZATION & LAYERS ---
    PIXI.BaseTexture.defaultOptions.scaleMode = PIXI.SCALE_MODES.NEAREST;
    
    const app = new PIXI.Application({ 
        resizeTo: window, 
        backgroundColor: 0x0a0a0c,
        resolution: 0.35,  
        autoDensity: true 
    });
    
    document.getElementById('app-wrapper').appendChild(app.view);

    const colorShader = `
        varying vec2 vTextureCoord;
        uniform sampler2D uSampler;
        uniform float colorSteps;
        void main(void) {
            vec4 color = texture2D(uSampler, vTextureCoord);
            color.r = floor(color.r * colorSteps) / colorSteps;
            color.g = floor(color.g * colorSteps) / colorSteps;
            color.b = floor(color.b * colorSteps) / colorSteps;
            gl_FragColor = color;
        }
    `;

    const retroColorFilter = new PIXI.Filter(null, colorShader, { colorSteps: 16.0 });
    entityLayer.filters = [retroColorFilter];

    // --- 2. DYNAMIC GRID SYSTEM ---
    const gridGraphics = new PIXI.Graphics();
    backgroundLayer.addChild(gridGraphics);

    let TILE_W = 128, TILE_H = 64;
    function getOrigin() { return { x: app.screen.width / 2, y: app.screen.height * 0.35 }; }
    function toIso(cartX, cartY) { return { x: (cartX - cartY) * (TILE_W / 2) + getOrigin().x, y: (cartX + cartY) * (TILE_H / 2) + getOrigin().y }; }
    function toCart(screenX, screenY) {
        let adjX = screenX - getOrigin().x, adjY = screenY - getOrigin().y;
        return { x: (adjX / (TILE_W / 2) + adjY / (TILE_H / 2)) / 2, y: (adjY / (TILE_H / 2) - adjX / (TILE_W / 2)) / 2 };
    }

    function drawGrid() {
        gridGraphics.clear();
        gridGraphics.lineStyle(2, 0x222226, 1); 
        const GRID_SIZE = 25; 
        for (let i = -15; i <= GRID_SIZE; i++) {
            let p1 = toIso(i, -15); let p2 = toIso(i, GRID_SIZE);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
            p1 = toIso(-15, i); p2 = toIso(GRID_SIZE, i);
            gridGraphics.moveTo(p1.x, p1.y); gridGraphics.lineTo(p2.x, p2.y);
        }
    }

    function startHackingGame() {
        const container = document.getElementById('security-content');
        hackAttempts = 4;
        let shuffledDecoys = decoyWords.sort(() => 0.5 - Math.random()).slice(0, 14);
        let allWords = [...shuffledDecoys, targetWord].sort(() => 0.5 - Math.random());
        let html = `<div class="hack-container" id="hack-container-id"><div class="hack-main"><div class="hack-column" id="hack-col-1"></div><div class="hack-column" id="hack-col-2"></div></div><div class="hack-log-panel"><div class="hack-attempts">ATTEMPTS: <span id="hack-attempt-count">4</span> <span id="hack-blocks">■ ■ ■ ■</span></div><div class="hack-output" id="hack-output-log">> INITIATING LOGIN...<br>> ENTER PASSWORD.<br></div><div class="hack-hover-display" id="hack-hover-display">> <span class="cursor-block">█</span></div></div></div>`;

        for(let i=0; i<40; i++) {
            const hex = "0x" + Math.floor(Math.random()*65535).toString(16).toUpperCase().padStart(4, '0');
            let rowStr = ""; for(let j=0; j<14; j++) rowStr += garbageChars.charAt(Math.floor(Math.random() * garbageChars.length));

            if (wordIndex < allWords.length && Math.random() > 0.4) {
                const word = allWords[wordIndex]; const insertPos = Math.floor(Math.random() * (14 - word.length));
                const pre = rowStr.substring(0, insertPos).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const post = rowStr.substring(insertPos + word.length).replace(/</g, "&lt;").replace(/>/g, "&gt;");

                wordIndex++;
            } else { rowStr = rowStr.replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
            let delay = (i < 20 ? i : i - 20) * 0.03;
            const rowHtml = `<div class="hack-row" style="animation-delay: ${delay}s"><span class="hack-hex">${hex}</span> <span>${rowStr}</span></div>`;

                        }

            // It creates a tight, bustling factory floor without crossing the collision threshold.
            for (let x = -4; x <= 8; x += 4) {
                for (let y = -4; y <= 8; y += 4) {

        window.createDraggable = function(textureData, gridX, gridY, catalogId, scale = 1, grabOffset = 30, isUndeletable = false, customHitbox = null) {
            let entity; let tex; 
            
            // Get physical properties from catalog

                        blinkTimer++;
                        if (blinkTimer % 4 === 0) { entity.alpha = entity.alpha === 1 ? 0 : 1; }
                        if (blinkTimer > 24) { app.ticker.remove(blinkAnim); entity.destroy(); }
                    };
                    app.ticker.add(blinkAnim);
                    return;
                }

                if(claw.mode !== 'idle' && claw.visible) return; 
                
                dragging = true; entity.isDragging = true;
                entity.cursor = 'grabbing'; entity.alpha = 0.8; 
                
                dragOffset.x = entity.x - e.data.global.x; 
                dragOffset.y = entity.y - e.data.global.y;
                
                claw.texture = openClawTex; claw.visible = true;
                claw.x = entity.x; claw.y = -300; 
                claw.targetY = entity.y - entity.grabOffset; 
                claw.baseY = entity.baseY; 
                claw.mode = 'manual_dropping';
            });

            const endDrag = () => {
                if(!dragging) return;
                dragging = false; entity.isDragging = false;
                entity.cursor = 'grab'; entity.alpha = 1;
                claw.texture = openClawTex; claw.mode = 'manual_retracting'; claw.targetY = -300;
            };

            entity.on('pointerup', endDrag);
            entity.on('pointerupoutside', endDrag);

          entity.on('globalpointermove', (e) => {
                if (dragging && !demolishMode) {
                    let rawX = e.data.global.x + dragOffset.x;
                    let rawY = e.data.global.y + dragOffset.y;
                    
                    let bestSupport = null;
                    let targetElevation = 0;

                    // 🔥 THE RED DOT (The object's exact feet)
                    const basePoint = new PIXI.Point(rawX, rawY);
                    
                    entityLayer.children.forEach(other => {
                        if (other === entity || !other.type || demolishMode || !other.physicalHeight || !other.interactive) return;
                        
                        const localPoint = other.toLocal(basePoint);
                        
                        if (other.hitArea && other.hitArea.contains(localPoint.x, localPoint.y)) {
                            // Are we using a custom Polygon (like the belt) or a Rectangle (like the pillar)?
                            const isPolygon = other.hitArea instanceof PIXI.Polygon;
                            
                            // Calculate where the exact visual "Roof" of the machine is
                            const roofY = other.y - other.physicalHeight;
                            
                            // If it's a polygon, trust it completely. 
                            // If it's a rectangle, the Red Dot MUST be dragged up near the roof!
                            if (isPolygon || rawY <= roofY + 60) {
                                const elevationHere = (other.elevation || 0) + other.physicalHeight;
                                if (elevationHere > targetElevation) {
                                    targetElevation = elevationHere;
                                    bestSupport = other; // Save the object we are standing on!
                                }
                            }
                        }
                    });

                    // Link the object to its new parent
                    entity.supportedBy = bestSupport;
                    entity.elevation = targetElevation;
                    
                    // Logic Projection
                    let adjustedFloorY = rawY + targetElevation;
                    const cart = toCart(rawX, adjustedFloorY);
                    entity.gridX = cart.x; entity.gridY = cart.y;
                    
                    // Visual Updates
                    const logicalPos = toIso(entity.gridX, entity.gridY);
                    entity.baseY = logicalPos.y; 
                    entity.x = rawX; 
                    entity.y = rawY; 
                    
                    // Claw logic
                    claw.x = entity.x; claw.baseY = entity.baseY; 
                    if (claw.mode === 'manual_dropping') claw.targetY = entity.y - entity.grabOffset;
                    else claw.y = entity.y - entity.grabOffset; 
                    
                    document.getElementById('coords-display').innerText = `X: ${entity.gridX.toFixed(1)} | Y: ${entity.gridY.toFixed(1)}`;
                }
            }); 
            
            return entity;
        }
        
        // --- INITIAL SCENE SETUP ---
        const bannerItem = BUILD_CATALOG.find(i => i.id === 'banner');
        const robotBaseItem = BUILD_CATALOG.find(i => i.id === 'robot_base');
        const humanWorkerItem = BUILD_CATALOG.find(i => i.id === 'human_worker');
        
        const getAnimFrames = (item, dir) => [`${item.animBase}/${dir}/frame_000.png`, `${item.animBase}/${dir}/frame_001.png`, `${item.animBase}/${dir}/frame_002.png`, `${item.animBase}/${dir}/frame_003.png`];

        window.createDraggable(bannerItem.textureData, -2.2, 10.4, bannerItem.id, bannerItem.scale, bannerItem.grabOffset, true, bannerItem.hitbox); 
        window.createDraggable(getAnimFrames(robotBaseItem, 'south-east'), 0, 0, robotBaseItem.id, robotBaseItem.scale, robotBaseItem.grabOffset, false, robotBaseItem.hitbox);
        window.createDraggable(getAnimFrames(robotBaseItem, 'south'), 2, 2, robotBaseItem.id, robotBaseItem.scale, robotBaseItem.grabOffset, false, robotBaseItem.hitbox);
        window.createDraggable(getAnimFrames(humanWorkerItem, 'south-west'), -2, 2, humanWorkerItem.id, humanWorkerItem.scale, humanWorkerItem.grabOffset, false, humanWorkerItem.hitbox);

       // --- 10. GLOBAL TICKER FOR TRUE Z-SORTING & CLAW PHYSICS ---
        app.ticker.add(() => {
            
            // PASS 1: Base Floor Sorting
            entityLayer.children.forEach(c => { 
                if (c.baseY !== undefined) {
                    c.zIndex = c.baseY; 
                }
            });

            // PASS 2: Linked Stacking
            entityLayer.children.forEach(c => {
                // If this object is sitting on a machine, force it to render IN FRONT of that machine!
                if (c.supportedBy && c.supportedBy.zIndex !== undefined) {
                    // We add a tiny fraction of its own baseY so multiple humans 
                    // standing on the SAME belt will still sort correctly amongst themselves!
                    c.zIndex = c.supportedBy.zIndex + 10 + (c.baseY * 0.001);
                }
            });

            entityLayer.sortChildren(); // Force engine to apply new layers

            // (Keep your existing claw physics below...)
            if (claw.visible && claw.mode !== 'idle') {
                claw.zIndex = Math.floor(claw.baseY + 1000); 
                chain.zIndex = Math.floor(claw.baseY + 1000); 

                if (claw.mode === 'manual_dropping') {
                    claw.y += (claw.targetY - claw.y) * 0.6;
                    if (Math.abs(claw.targetY - claw.y) < 5) { claw.y = claw.targetY; claw.mode = 'manual_holding'; claw.texture = closedClawTex; }
                } else if (claw.mode === 'manual_retracting') {
                    claw.y += (claw.targetY - claw.y) * 0.3;
                    if (claw.y < -100) { claw.mode = 'idle'; claw.visible = false; chain.clear(); }
                }

                if (claw.visible) {
                    chain.clear(); const chainX = claw.x - 12; 
                    for (let cy = -300; cy < claw.y - 280; cy += 14) {
                        chain.beginFill(0xaaaaaa); chain.drawRect(chainX - 3, cy, 6, 10);
                        chain.beginFill(0x1a1a1a); chain.drawRect(chainX - 1, cy + 2, 2, 6); chain.endFill();
                        chain.beginFill(0x333333); chain.drawRect(chainX - 5, cy + 8, 10, 4);
                        chain.beginFill(0x777777); chain.drawRect(chainX - 5, cy + 8, 10, 2); chain.endFill();
                    }
                }
            }


        });
            generateRandomFactory();
        resizeApp();
    });
</script>
